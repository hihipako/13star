<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>열세 번째 별자리</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex; justify-content:center; align-items:center; flex-direction:column;
  min-height:100vh; min-height:100dvh; overflow:auto;
  font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
  touch-action:none; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
}
canvas { display:block; image-rendering:pixelated; }
/* Virtual controls — only visible on touch devices */
#mobileControls { display:none; position:fixed; bottom:0; left:0; width:100%; height:140px; pointer-events:none; z-index:100; }
.vbtn { position:absolute; pointer-events:auto; border:2px solid rgba(255,255,255,0.3); border-radius:12px;
  background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); font-size:14px; font-family:sans-serif;
  display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
.vbtn:active,.vbtn.pressed { background:rgba(255,255,255,0.25); border-color:rgba(255,255,255,0.6); }
/* D-pad — cross layout with empty center */
#vUp { left:55px; bottom:95px; width:48px; height:48px; }
#vDown { left:55px; bottom:0px; width:48px; height:48px; }
#vLeft { left:8px; bottom:48px; width:48px; height:48px; }
#vRight { left:102px; bottom:48px; width:48px; height:48px; }
/* Action buttons */
#vE { right:10px; bottom:50px; width:55px; height:55px; border-radius:50%; font-size:16px; }
#vSpace { right:75px; bottom:50px; width:55px; height:55px; border-radius:50%; font-size:11px; }
#vQ { right:42px; bottom:115px; width:42px; height:42px; border-radius:50%; font-size:13px; }
@media (hover:hover) and (pointer:fine) { #mobileControls { display:none !important; } }
/* Portrait orientation overlay */
#rotateOverlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999;
  background:#000; color:#aabbcc;
  flex-direction:column; justify-content:center; align-items:center;
  font-family:'Malgun Gothic','맑은 고딕',sans-serif; text-align:center;
}
#rotateOverlay .rotate-icon { font-size:60px; margin-bottom:20px; animation:rotateAnim 2s ease-in-out infinite; }
#rotateOverlay .rotate-text { font-size:18px; line-height:1.6; }
@keyframes rotateAnim { 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(90deg);} }
@media (orientation:portrait) and (hover:none) and (pointer:coarse) {
  #rotateOverlay { display:flex !important; }
  canvas, #mobileControls { display:none !important; }
}
</style>
</head>
<body>
<div id="rotateOverlay">
  <div class="rotate-icon">📱</div>
  <div class="rotate-text">기기를 가로로 돌려주세요<br><br>↻</div>
</div>
<canvas id="c" width="800" height="600"></canvas>
<div id="mobileControls">
  <div class="vbtn" id="vUp">▲</div>
  <div class="vbtn" id="vDown">▼</div>
  <div class="vbtn" id="vLeft">◀</div>
  <div class="vbtn" id="vRight">▶</div>
  <div class="vbtn" id="vE">E</div>
  <div class="vbtn" id="vSpace">Space</div>
  <div class="vbtn" id="vQ">Q</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=800, H=600;

// ─── RESPONSIVE SCALING ─────────────────────────────────────────────────────
function resizeCanvas(){
  const isMobile='ontouchstart' in window;
  const isLandscape=window.innerWidth>window.innerHeight;
  const pad=(isMobile&&!isLandscape)?140:0; // no pad in landscape
  const maxW=window.innerWidth;
  const maxH=(window.innerHeight||document.documentElement.clientHeight)-pad;
  let scale=Math.min(maxW/W,maxH/H);
  // Mobile landscape: enforce minimum 1.75x visual scale relative to device
  if(isMobile&&isLandscape){
    const minScale=Math.max(scale, maxH/H); // fill height
    scale=minScale;
  }
  canvas.style.width=Math.floor(W*scale)+'px';
  canvas.style.height=Math.floor(H*scale)+'px';
  // Show mobile controls on touch devices
  const mc=document.getElementById('mobileControls');
  if(mc)mc.style.display=isMobile?'block':'none';
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

// ─── INPUT ──────────────────────────────────────────────────────────────────
const keys={};
const mouse={x:0,y:0,down:false,justDown:false,justUp:false,_wasDown:false};
window.addEventListener('keydown',e=>{keys[e.code]=true; e.preventDefault && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key) && e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
// Mouse → canvas coordinate conversion (accounts for scaling)
function canvasCoords(cx,cy){
  const r=canvas.getBoundingClientRect();
  return {x:(cx-r.left)*(W/r.width), y:(cy-r.top)*(H/r.height)};
}
canvas.addEventListener('mousemove',e=>{const c=canvasCoords(e.clientX,e.clientY);mouse.x=c.x;mouse.y=c.y;});
canvas.addEventListener('mousedown',e=>{mouse.down=true;mouse.justDown=true;});
canvas.addEventListener('mouseup',e=>{mouse.down=false;mouse.justUp=true;});

// ─── TOUCH INPUT (mobile) ───────────────────────────────────────────────────
// Touch on canvas → mouse events
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  const c=canvasCoords(t.clientX,t.clientY);
  mouse.x=c.x;mouse.y=c.y;mouse.down=true;mouse.justDown=true;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  const c=canvasCoords(t.clientX,t.clientY);
  mouse.x=c.x;mouse.y=c.y;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  mouse.down=false;mouse.justUp=true;
},{passive:false});

// Virtual buttons → keys mapping
const vBtnMap={
  vUp:'ArrowUp',vDown:'ArrowDown',vLeft:'ArrowLeft',vRight:'ArrowRight',
  vE:'KeyE',vSpace:'Space',vQ:'KeyQ'
};
Object.keys(vBtnMap).forEach(id=>{
  const el=document.getElementById(id);
  if(!el)return;
  const code=vBtnMap[id];
  el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();keys[code]=true;el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();keys[code]=false;el.classList.remove('pressed');},{passive:false});
  el.addEventListener('touchcancel',e=>{keys[code]=false;el.classList.remove('pressed');});
});

// ─── AUDIO ──────────────────────────────────────────────────────────────────
let audioCtx=null;
function initAudio(){if(audioCtx)return; audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
const bgGain={node:null};
let bgInterval=null;
const NOTE={C3:130.8,D3:146.8,E3:164.8,F3:174.6,G3:196,A3:220,B3:246.9,
             C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,
             C5:523.3,D5:587.3,E5:659.3,G5:784,A5:880};
const SCALE=[NOTE.C4,NOTE.D4,NOTE.E4,NOTE.G4,NOTE.A4,NOTE.C5,NOTE.D5,NOTE.E5];

function playNote(freq,dur,vol=0.15,type='sine',delay=0){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  const t=audioCtx.currentTime+delay;
  o.type=type;
  o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.05);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+dur+0.1);
}

function playChime(){
  playNote(NOTE.G5,0.8,0.12,'sine');
  playNote(NOTE.E5,0.6,0.08,'sine',0.1);
  playNote(NOTE.C5,1.2,0.06,'sine',0.2);
}
function playGlitch(){
  if(!audioCtx)return;
  for(let i=0;i<5;i++) playNote(100+Math.random()*400,0.05,0.08,'sawtooth',i*0.04);
}
function playSuccess(){
  const seq=[NOTE.G4,NOTE.A4,NOTE.C5,NOTE.E5];
  seq.forEach((f,i)=>playNote(f,0.4,0.12,'sine',i*0.12));
  setTimeout(()=>playChime(),600);
}

let bgNoteIdx=0;
const bgMelody=[NOTE.A3,NOTE.C4,NOTE.E4,NOTE.G4,NOTE.E4,NOTE.D4,NOTE.C4,NOTE.A3,
                NOTE.G3,NOTE.B3,NOTE.D4,NOTE.F4,NOTE.D4,NOTE.C4,NOTE.B3,NOTE.G3];
function startBGM(){
  if(!audioCtx)return;
  stopBGM();
  bgInterval=setInterval(()=>{
    const n=bgMelody[bgNoteIdx%bgMelody.length];
    playNote(n,0.9,0.06,'sine');
    playNote(n*0.5,1.8,0.03,'sine');
    bgNoteIdx++;
  },600);
}
function stopBGM(){if(bgInterval){clearInterval(bgInterval);bgInterval=null;}}
function playEndingBGM(){
  stopBGM();
  const melody=[NOTE.C4,NOTE.E4,NOTE.G4,NOTE.C5,NOTE.G4,NOTE.E4,NOTE.G4,NOTE.A4,NOTE.G4,NOTE.E4,NOTE.C4];
  melody.forEach((f,i)=>{
    playNote(f,1.5,0.1,'sine',i*0.8);
    playNote(f*0.5,2.0,0.04,'sine',i*0.8);
  });
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
const particles=[];
function spawnParticle(x,y,options={}){
  particles.push({
    x,y,
    vx:(Math.random()-0.5)*(options.spread||120),
    vy:(Math.random()-0.5)*(options.spread||120)-(options.up||0),
    life:1, maxLife:options.life||1.5,
    size:options.size||3,
    color:options.color||'#88aaff',
    gravity:options.gravity||0
  });
}
function spawnBurst(x,y,count=12,opts={}){
  for(let i=0;i<count;i++) spawnParticle(x,y,opts);
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vy+=p.gravity*dt;
    p.life-=dt/p.maxLife;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life)*0.9;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;
    ctx.shadowBlur=6;
    const s=p.size*p.life;
    ctx.fillRect(p.x-s/2,p.y-s/2,s,s);
    ctx.restore();
  });
}

// Floating ambient particles
const ambientParts=[];
for(let i=0;i<60;i++){
  ambientParts.push({x:Math.random()*W,y:Math.random()*H,
    size:Math.random()*2+0.5,speed:Math.random()*15+5,
    color:['#334488','#553399','#224466','#443366'][Math.floor(Math.random()*4)],
    phase:Math.random()*Math.PI*2});
}
function updateAmbient(dt,t){
  ambientParts.forEach(p=>{
    p.y-=p.speed*dt;
    p.x+=Math.sin(t*0.5+p.phase)*8*dt;
    if(p.y<-5){p.y=H+5;p.x=Math.random()*W;}
  });
}
function drawAmbient(){
  ambientParts.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=0.4;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;
    ctx.shadowBlur=4;
    ctx.fillRect(p.x,p.y,p.size,p.size);
    ctx.restore();
  });
}

// ─── STARS ──────────────────────────────────────────────────────────────────
const stars=[];
for(let i=0;i<250;i++){
  stars.push({x:Math.random()*W,y:Math.random()*H,
    size:Math.random()*1.5+0.3,
    phase:Math.random()*Math.PI*2,
    speed:Math.random()*2+1,
    col:['#aabbff','#ffaaff','#aaffff','#ffffff'][Math.floor(Math.random()*4)]
  });
}
function drawStars(t,alpha=1){
  stars.forEach(s=>{
    const bright=0.4+0.6*Math.abs(Math.sin(t*s.speed+s.phase));
    ctx.save();
    ctx.globalAlpha=bright*alpha;
    ctx.fillStyle=s.col;
    ctx.shadowColor=s.col;
    ctx.shadowBlur=s.size*4;
    ctx.fillRect(s.x-s.size/2,s.y-s.size/2,s.size,s.size);
    ctx.restore();
  });
}

// ─── SHAKE / GLITCH ─────────────────────────────────────────────────────────
let shakeTime=0, shakeAmt=0;
let glitchTime=0;
let flashAlpha=0;
function triggerShake(dur=0.3,amt=6){shakeTime=dur;shakeAmt=amt;}
function triggerGlitch(dur=0.4){glitchTime=dur;playGlitch();}
function triggerFlash(a=0.8){flashAlpha=a;}
function drawGlitch(){
  if(glitchTime<=0)return;
  ctx.save();
  const lines=8;
  for(let i=0;i<lines;i++){
    const y=Math.random()*H;
    const h=Math.random()*20+2;
    const shift=Math.random()*20-10;
    ctx.drawImage(canvas,0,y,W,h,shift,y,W,h);
  }
  // Color aberration
  ctx.globalAlpha=0.3;
  ctx.fillStyle='#ff0044';
  ctx.fillRect(Math.random()*W-50,0,Math.random()*100,H);
  ctx.restore();
}

// ─── FADE ────────────────────────────────────────────────────────────────────
let fadeAlpha=0, fadeDir=0, fadeCB=null;
function fadeOut(cb){fadeDir=1;fadeCB=cb;}
function fadeIn(){fadeDir=-1;}
function updateFade(dt){
  if(fadeDir===1){
    fadeAlpha=Math.min(1,fadeAlpha+dt*2);
    if(fadeAlpha>=1&&fadeCB){
      const cb=fadeCB;
      fadeCB=null;
      fadeDir=0;
      cb(); // cb 안에서 fadeIn()이 호출되어도 덮어써지지 않음
    }
  } else if(fadeDir===-1){
    fadeAlpha=Math.max(0,fadeAlpha-dt*1.5);
    if(fadeAlpha<=0)fadeDir=0;
  }
}
function drawFade(){
  if(fadeAlpha>0){
    ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;
    ctx.fillRect(0,0,W,H);
  }
}

// ─── DRAW UTILS ──────────────────────────────────────────────────────────────
function glow(color,size){ctx.shadowColor=color;ctx.shadowBlur=size;}
function noGlow(){ctx.shadowBlur=0;}
function glowText(txt,x,y,color='#aabbff',size=18,blur=15,align='center'){
  ctx.save();
  ctx.font=`${size}px 'Malgun Gothic','맑은 고딕',sans-serif`;
  ctx.textAlign=align;
  ctx.fillStyle=color;
  glow(color,blur);
  ctx.fillText(txt,x,y);
  ctx.restore();
}
function pixelRect(x,y,w,h,color,glowColor=null,glowSize=8){
  ctx.save();
  if(glowColor){ctx.shadowColor=glowColor;ctx.shadowBlur=glowSize;}
  ctx.fillStyle=color;
  ctx.fillRect(Math.round(x),Math.round(y),w,h);
  ctx.restore();
}
function drawStar5(cx,cy,r,color){
  ctx.save();
  ctx.fillStyle=color;
  ctx.shadowColor=color; ctx.shadowBlur=12;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=Math.PI/2+i*Math.PI*2/5;
    const ai=a+Math.PI/5;
    ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    ctx.lineTo(cx+Math.cos(ai)*r*0.4,cy+Math.sin(ai)*r*0.4);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Player sprite drawing
function drawPlayer(x,y,frame,awakened,t){
  ctx.save();
  const px=Math.round(x-9), py=Math.round(y-20);
  // Shadow
  ctx.fillStyle='rgba(0,0,60,0.4)';
  ctx.beginPath();ctx.ellipse(x,y+2,8,3,0,0,Math.PI*2);ctx.fill();

  if(awakened){
    // Constellation body
    glow('#88ccff',20);
    ctx.strokeStyle='#88ccff';
    ctx.lineWidth=1;
    const pts=[[0,-18],[8,-8],[5,0],[-5,0],[-8,-8]];
    ctx.beginPath();
    pts.forEach((p,i)=>i?ctx.lineTo(x+p[0],y+p[1]):ctx.moveTo(x+p[0],y+p[1]));
    ctx.closePath();ctx.stroke();
    pts.forEach(p=>{
      ctx.fillStyle='#ffffff';
      ctx.shadowBlur=10;
      ctx.fillRect(x+p[0]-2,y+p[1]-2,4,4);
    });
    // Legs
    ctx.strokeStyle='#667799';ctx.shadowBlur=5;
    ctx.beginPath();ctx.moveTo(x-3,y);ctx.lineTo(x-4,y+12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+3,y);ctx.lineTo(x+4,y+12);ctx.stroke();
    // Particles around
    for(let i=0;i<5;i++){
      const a=t*0.7+i*Math.PI*2/5;
      const r=16+Math.sin(t+i)*4;
      ctx.fillStyle='rgba(136,204,255,0.6)';
      ctx.shadowBlur=6;
      ctx.fillRect(x+Math.cos(a)*r-1,y-8+Math.sin(a)*r*0.5-1,2,2);
    }
    // Glow outline
    ctx.strokeStyle='rgba(136,204,255,0.3)';
    ctx.lineWidth=8;
    ctx.beginPath();
    ctx.ellipse(x,y-8,12,18,0,0,Math.PI*2);
    ctx.stroke();
  } else {
    // Normal researcher character — gender-based appearance
    const isF=G.gender==='f';
    const bob=Math.floor(frame/2)%2;
    glow('#334488',8);
    // Lab coat
    ctx.fillStyle='#ccccdd';
    ctx.fillRect(px+2,py+9,14,14);
    ctx.fillStyle='#aaaacc';
    ctx.fillRect(px+2,py+18,14,5);
    // Shirt — green(F) or light blue(M)
    ctx.fillStyle=isF?'#88cc66':'#88aacc';
    ctx.fillRect(px+4,py+10,10,8);
    // Head
    ctx.fillStyle=isF?'#f0d0b0':'#e8c8a0';
    glow(isF?'#f0d0b0':'#e8c8a0',4);
    ctx.fillRect(px+3,py+1,12,10);
    // Hair
    ctx.fillStyle=isF?'#8B5E3C':'#1a1a22';
    ctx.fillRect(px+3,py+1,12,4);
    // Ponytail (female only)
    if(isF){
      ctx.fillStyle='#7A4E2C';
      ctx.fillRect(px+13,py+2,3,8);
      // Hair tie
      ctx.fillStyle='#cc4466';
      ctx.fillRect(px+13,py+3,2,2);
    }
    // Eyes
    ctx.fillStyle=isF?'#885533':'#88aaff';
    glow(isF?'#aa7744':'#88aaff',6);
    ctx.fillRect(px+5,py+6,2,2);
    ctx.fillRect(px+11,py+6,2,2);
    // Legs — black pants(F) or navy jeans(M)
    noGlow();
    ctx.fillStyle=isF?'#1a1a22':'#223355';
    ctx.fillRect(px+3,py+23,5,6+bob);
    ctx.fillRect(px+10,py+23,5,6+(1-bob));
    // Shoes — blue sneakers(F) or brown shoes(M)
    ctx.fillStyle=isF?'#3366aa':'#6B4226';
    ctx.fillRect(px+2,py+29+bob,7,3);
    ctx.fillRect(px+9,py+29+(1-bob),7,3);
    // Constellation detail on coat
    ctx.fillStyle='rgba(136,170,255,0.3)';
    ctx.fillRect(px+3,py+12,1,1);
    ctx.fillRect(px+5,py+10,1,1);
    ctx.fillRect(px+7,py+13,1,1);
  }
  ctx.restore();
}

// ─── ZODIAC DATA ─────────────────────────────────────────────────────────────
const ZODIACS=[
  {name:'양자리', sym:'♈', season:'봄', idx:0},
  {name:'황소자리', sym:'♉', season:'봄', idx:1},
  {name:'쌍둥이자리', sym:'♊', season:'봄', idx:2},
  {name:'게자리', sym:'♋', season:'여름', idx:3},
  {name:'사자자리', sym:'♌', season:'여름', idx:4},
  {name:'처녀자리', sym:'♍', season:'여름', idx:5},
  {name:'천칭자리', sym:'♎', season:'가을', idx:6},
  {name:'전갈자리', sym:'♏', season:'가을', idx:7},
  {name:'사수자리', sym:'♐', season:'가을', idx:8},
  {name:'염소자리', sym:'♑', season:'겨울', idx:9},
  {name:'물병자리', sym:'♒', season:'겨울', idx:10},
  {name:'물고기자리', sym:'♓', season:'겨울', idx:11},
];
const COLORS=['#ff6666','#ffaa44','#ffff66','#66ff66','#44ffaa','#44aaff',
              '#aa66ff','#ff44aa','#ff8844','#88ddff','#6688ff','#cc88ff'];

// ─── ZODIAC CONSTELLATION PATTERNS (for Puzzle 5) ────────────────────────────
// Each constellation: stars [{x,y}] on an 8x7 grid, lines [[starIdx,starIdx]]
const ZODIAC_CONSTELLATIONS=[
  {name:'양자리',sym:'♈',col:'#ff6666',
    stars:[{x:2,y:4},{x:3,y:2},{x:5,y:2},{x:6,y:3}],
    lines:[[0,1],[1,2],[2,3]]},
  {name:'황소자리',sym:'♉',col:'#ffaa44',
    stars:[{x:1,y:4},{x:2,y:3},{x:3,y:3},{x:4,y:2},{x:6,y:1},{x:6,y:3}],
    lines:[[0,1],[1,2],[2,3],[3,4],[3,5]]},
  {name:'쌍둥이자리',sym:'♊',col:'#ffff66',
    stars:[{x:2,y:1},{x:2,y:3},{x:2,y:5},{x:5,y:1},{x:5,y:3},{x:3,y:4}],
    lines:[[0,1],[1,2],[3,4],[1,5],[5,4]]},
  {name:'게자리',sym:'♋',col:'#66ff66',

const LB_KEY='13constellation_leaderboard';
const LB_DEFAULT=[{name:'서령',time:0},{name:'페트리접시',time:21},{name:'신모씨',time:43}];
let lbFirstClear=false; // true after first real clear
let leaderboard=null; // null = default (never cleared), array = real records
function loadLeaderboard(){
  try{
    const raw=localStorage.getItem(LB_KEY);
    if(raw){const d=JSON.parse(raw);lbFirstClear=d.cleared;leaderboard=d.records;}
  }catch(e){}
}
function saveLeaderboard(){
  try{localStorage.setItem(LB_KEY,JSON.stringify({cleared:lbFirstClear,records:leaderboard}));}catch(e){}
}
function getDisplayBoard(){return leaderboard||LB_DEFAULT;}
function formatTime(secs){
  const m=Math.floor(secs/60).toString().padStart(2,'0');
  const s=(secs%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}
function isNewRecord(time){
  const board=getDisplayBoard();
  if(!lbFirstClear)return true;
  return board.length<3||time<board[board.length-1].time;
}
function insertRecord(name,time){
  if(!lbFirstClear){
    // First clear: wipe defaults, start fresh
    lbFirstClear=true;
    leaderboard=[{name,time}];
  } else {
    if(!leaderboard)leaderboard=[];
    leaderboard.push({name,time});
    leaderboard.sort((a,b)=>a.time-b.time);
    if(leaderboard.length>3)leaderboard.length=3;
  }
  saveLeaderboard();
}
loadLeaderboard();

const DEV_SEQ=['Digit3','Digit1','Digit3'];
let devIdx=0,devFirstTime=0;
window.addEventListener('keydown',e=>{
  if(NI.active)return;
  if(e.code===DEV_SEQ[devIdx]){
    if(devIdx===0)devFirstTime=Date.now();
    devIdx++;

      devIdx=0;

        // Full reset: clear localStorage and reload
        try{localStorage.removeItem(LB_KEY);}catch(ex){}

      }
    }
  } else {
    devIdx=e.code===DEV_SEQ[0]?1:0;
    if(devIdx===1)devFirstTime=Date.now();
  }
});

const TMI={active:false,timer:0,text:'',callback:null,duration:5,usedIndices:[]};
function pickTMI(){
  if(TMI.usedIndices.length>=TMI_LIST.length)TMI.usedIndices=[];
  let idx;
  do{idx=Math.floor(Math.random()*TMI_LIST.length);}while(TMI.usedIndices.includes(idx));
  TMI.usedIndices.push(idx);
  return TMI_LIST[idx];
}
function showTMI(callback){
  TMI.active=true;TMI.timer=0;TMI.text=pickTMI();TMI.callback=callback;TMI.duration=5;
  fadeAlpha=0;fadeDir=0;fadeCB=null;
}
function updateTMI(dt){
  if(!TMI.active)return;
  TMI.timer+=dt;
  if(TMI.timer>=TMI.duration){
    TMI.active=false;
    if(TMI.callback)TMI.callback();
  }
}
function renderTMI(t){
  if(!TMI.active)return;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  // Parse |highlight| syntax
  const parts=TMI.text.split('|');
  const fontSize=Math.round(H/6/4*0.6); // 60% of original
  ctx.font=`${fontSize}px 'Malgun Gothic','맑은 고딕',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  const maxW=W*0.8;
  const fadeIn=Math.min(1,TMI.timer/0.8);
  const fadeOut2=Math.min(1,(TMI.duration-TMI.timer)/0.8);
  const alpha=Math.min(fadeIn,fadeOut2);
  ctx.save();
  ctx.globalAlpha=alpha;
  const lineHeight=fontSize*1.6;
  // Character-by-character word wrap (handles long parts)
  const renderLines=[];
  let curLine=[];let curW=0;
  parts.forEach((p,i)=>{
    const isH=i%2===1;
    let seg='';
    for(let c=0;c<p.length;c++){
      const segTry=seg+p[c];
      const tryW=ctx.measureText(segTry).width;
      if(curW+tryW>maxW&&(curLine.length>0||seg.length>0)){
        if(seg)curLine.push({text:seg,highlight:isH});
        renderLines.push(curLine);
        curLine=[];curW=0;seg=p[c];
      } else {
        seg=segTry;
      }
    }
    if(seg){curLine.push({text:seg,highlight:isH});curW+=ctx.measureText(seg).width;}
  });
  if(curLine.length>0)renderLines.push(curLine);
  const totalH=renderLines.length*lineHeight;
  const startY=H/2-totalH/2+lineHeight/2;
  renderLines.forEach((line,li)=>{
    let lw=0;line.forEach(p=>{lw+=ctx.measureText(p.text).width;});
    let cx2=W/2-lw/2;
    line.forEach(p=>{
      if(p.highlight){
        glow('#ffaa44',12);ctx.fillStyle='#ffaa44';
      } else {
        glow('#6688cc',8);ctx.fillStyle='#8899cc';
      }
      ctx.textAlign='left';
      ctx.fillText(p.text,cx2,startY+li*lineHeight);
      cx2+=ctx.measureText(p.text).width;
    });
  });
  noGlow();
  // TMI label
  ctx.globalAlpha=alpha*0.4;
  glowText('TMI',W/2,H-40,'#556677',12,4);
  ctx.restore();
}

// Collision helper
function collides(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function resolveWalls(px,py,pw,ph,map){
  let nx=px, ny=py;
  for(const w of map.walls){
    if(collides(nx,ny,pw,ph,w.x,w.y,w.w,w.h)){
      // Resolve x
      const overlapLeft=nx+pw-w.x;
      const overlapRight=w.x+w.w-nx;
      const overlapTop=ny+ph-w.y;
      const overlapBottom=w.y+w.h-ny;
      const minX=Math.min(overlapLeft,overlapRight);
      const minY=Math.min(overlapTop,overlapBottom);
      if(minX<minY){
        nx=overlapLeft<overlapRight?w.x-pw:w.x+w.w;
      } else {
        ny=overlapTop<overlapBottom?w.y-ph:w.y+w.h;
      }
    }
  }
  return {x:nx,y:ny};
}

  dragging:null,
  scattered:[],

  getWrongCount(){

    this.slots=[];

    const cx=W/2, cy=248;

      const a=Math.PI*2*i/12-Math.PI/2;
      this.slots.push({x:cx+Math.cos(a)*168,y:cy+Math.sin(a)*152,zodiacIdx:-1,correctIdx:i});
    }
    const order=[3,7,1,10,5,0,8,2,11,6,4,9];
    order.forEach((zi,i)=>{
      const col=i%6, row=Math.floor(i/6);
      this.scattered.push({zodiacIdx:zi,x:72+col*132,y:472+row*52});
    });
    this.dragging=null;
  },
  check(){

    if(placed.length<12)return false;

// PUZZLE 3: Parallax View — find the closest star by observing parallax movement
const P3={
  active:false,solved:false,
  stars:[], // {x,y,baseX,baseY,depth,size,color,name,isClosest}
  round:0,  // current round (0-2, 3 rounds total)
  totalRounds:3,
  viewX:0,  // parallax offset driven by mouse
  feedback:'',feedbackTimer:0,feedbackColor:'',
  init(){
    this.solved=false;
    this.round=0;
    this.feedback='';this.feedbackTimer=0;
    this.generateRound();
  },
  generateRound(){
    this.stars=[];
    const count=5+this.round; // 5, 6, 7 stars per round
    // Assign random depths (0.1=very close, 1.0=very far)
    const depths=[];
    for(let i=0;i<count;i++)depths.push(0.1+Math.random()*0.9);
    // One star is clearly the closest (smallest depth)
    const closestIdx=Math.floor(Math.random()*count);
    depths[closestIdx]=0.05+Math.random()*0.08; // very close: 0.05~0.13
    // Make sure others are noticeably farther
    for(let i=0;i<count;i++){
      if(i!==closestIdx&&depths[i]<0.25)depths[i]=0.25+Math.random()*0.6;
    }
    const starNames=['시리우스','베가','알타이르','데네브','폴라리스','리겔','베텔게우스','카펠라','프로키온','아크투루스'];
    const starCols=['#aaccff','#ffddaa','#ffffff','#aaeeff','#ffaacc','#ccffaa','#ffccaa','#ddaaff','#aaffdd','#ffffaa'];
    for(let i=0;i<count;i++){
      const bx=200+Math.random()*(W-400);
      const by=150+Math.random()*(H-320);
      this.stars.push({
        baseX:bx,baseY:by,x:bx,y:by,
        depth:depths[i],
        size:3+Math.random()*2,
        color:starCols[i%starCols.length],
        name:starNames[i%starNames.length],
        isClosest:i===closestIdx,
      });
    }
    this.viewX=0;
  },
};

const P4={

// Dreamy light orb helper — floating ambient light source
function drawLightOrb(x,y,r,color,alpha,t,phase){
  const pulse=0.7+0.3*Math.sin(t*1.5+phase);
  const bx=x+Math.sin(t*0.4+phase)*8;
  const by=y+Math.cos(t*0.3+phase*1.3)*6;
  ctx.save();
  const g=ctx.createRadialGradient(bx,by,0,bx,by,r*pulse);
  g.addColorStop(0,color.replace(')',`,${alpha*pulse})`).replace('rgb','rgba'));
  g.addColorStop(0.4,color.replace(')',`,${alpha*pulse*0.4})`).replace('rgb','rgba'));
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;
  ctx.fillRect(bx-r,by-r,r*2,r*2);
  ctx.restore();
}
function drawFloatingLights(t,lights){
  lights.forEach((l,i)=>drawLightOrb(l.x,l.y,l.r,l.col,l.a||0.15,t,i*1.7));
}

// PUZZLE 1 RENDER
function renderP1(t){

  glowText('계절의 흐름을 따라 황도대를 배열하라',W/2,40,'#aabbff',16,12);

    ctx.fillStyle='#668899';
    ctx.fillText(seasonal[s.correctIdx],s.x,s.y+34);

  // Scattered items
  P1.scattered.forEach(item=>{

      ctx.save();
      ctx.strokeStyle=COLORS[item.zodiacIdx];

  }

}


// PUZZLE 3 RENDER
function renderP3(t){
  ctx.fillStyle='rgba(0,2,8,0.95)';
  ctx.fillRect(0,0,W,H);

  // Parallax offset from mouse position
  P3.viewX=(mouse.x-W/2)*0.3;

  // Deep background stars (barely move)
  for(let i=0;i<80;i++){
    const sx=(i*97+P3.viewX*0.02)%W;
    const sy=(i*131)%H;
    ctx.save();ctx.globalAlpha=0.2+0.1*Math.sin(t+i);
    ctx.fillStyle='#334466';
    ctx.fillRect(sx,sy,1,1);
    ctx.restore();
  }
  // Medium background stars
  for(let i=0;i<40;i++){
    const sx=((i*73+200)+P3.viewX*0.08)%W;
    const sy=(i*113+50)%H;
    ctx.save();ctx.globalAlpha=0.3+0.15*Math.sin(t*1.2+i);
    ctx.fillStyle='#556688';
    ctx.fillRect(sx,sy,1.5,1.5);
    ctx.restore();
  }

  // Title
  glowText('보이지 않는 거리 (The Parallax View)',W/2,28,'#aabbff',15,10);
  glowText(`라운드 ${P3.round+1}/${P3.totalRounds} — 가장 가까운 별을 찾아 클릭하세요`,W/2,52,'#8899aa',11,6);
  glowText('진실은 움직이는 자에게만 그 거리를 허락한다.',W/2,72,'#556677',9,4);

  // Puzzle stars — each moves based on depth (close=more parallax)
  P3.stars.forEach(s=>{
    // Parallax: closer stars move MORE with viewX
    const parallaxAmount=(1-s.depth)*1.5; // close=big, far=tiny
    s.x=s.baseX+P3.viewX*parallaxAmount;
    s.y=s.baseY+Math.sin(t*0.5+s.baseX*0.01)*3*parallaxAmount;

    // Star glow size based on depth (closer=slightly bigger)
    const visualSize=s.size+(1-s.depth)*2;
    const twinkle=0.7+0.3*Math.sin(t*2+s.baseX);

    // Hover detection
    const dx=mouse.x-s.x,dy=mouse.y-s.y;
    const hovered=dx*dx+dy*dy<(visualSize+15)*(visualSize+15);

    ctx.save();
    // Outer glow
    ctx.shadowColor=s.color;
    ctx.shadowBlur=hovered?20:8+visualSize;
    ctx.globalAlpha=twinkle;
    ctx.fillStyle=s.color;
    ctx.beginPath();ctx.arc(s.x,s.y,visualSize,0,Math.PI*2);ctx.fill();
    // Bright core
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffffff';
    ctx.globalAlpha=twinkle*0.9;
    ctx.beginPath();ctx.arc(s.x,s.y,visualSize*0.4,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // Name label (on hover)
    if(hovered){
      ctx.save();
      ctx.globalAlpha=0.7;
      glowText(s.name,s.x,s.y-visualSize-12,s.color,10,6);
      // Depth hint bar (shows relative movement amount)
      const barW=40,barH=3;
      const moveAmount=Math.min(1,parallaxAmount/1.5);
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(s.x-barW/2,s.y+visualSize+8,barW,barH);
      ctx.fillStyle=moveAmount>0.7?'#44ffaa':moveAmount>0.3?'#ffdd44':'#ff6666';
      ctx.fillRect(s.x-barW/2,s.y+visualSize+8,barW*moveAmount,barH);
      ctx.restore();
    }
  });

  // Mouse movement guide
  const guideAlpha=0.3+0.2*Math.sin(t*2);
  ctx.save();ctx.globalAlpha=guideAlpha;
  glowText('← 마우스를 좌우로 움직여 별의 시차를 관찰하세요 →',W/2,H-40,'#556688',10,4);
  ctx.restore();

  // Feedback
  if(P3.feedbackTimer>0){
    P3.feedbackTimer-=G.dt;
    const fa=Math.min(1,P3.feedbackTimer*2);
    const fs=1+(0.5-Math.min(0.5,P3.feedbackTimer))*0.8;
    ctx.save();ctx.globalAlpha=fa;
    ctx.translate(W/2,H/2);ctx.scale(fs,fs);
    glowText(P3.feedback,0,0,P3.feedbackColor,20,14);
    ctx.restore();
  }

  // Progress dots
  for(let i=0;i<P3.totalRounds;i++){
    const dx=W/2+(i-1)*20;
    ctx.save();
    ctx.fillStyle=i<P3.round?'#44ffaa':i===P3.round?'#ffffff':'#334455';
    ctx.shadowColor=i<P3.round?'#44ffaa':'';ctx.shadowBlur=i<P3.round?6:0;
    ctx.beginPath();ctx.arc(dx,H-18,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  drawCloseBtn();
}

// PUZZLE 4 RENDER — Ecliptic Orbit
function renderP4(t){
  ctx.fillStyle='rgba(0,0,0,0.92)';
  ctx.fillRect(0,0,W,H);
  drawStars(t,0.7);

  const cx=W/2, cy=H/2+10;
  const orbitR=195;

  // Title
  glowText('황도 궤도 퍼즐',W/2,28,'#aabbff',16,12);
  glowText(`현재 목표: ${MONTH_NAMES[P4.currentMonth]}의 별자리를 맞춰라`,W/2,52,'#ffdd88',14,10);

  // Orbit ellipse
  ctx.save();
  ctx.strokeStyle='rgba(60,80,150,0.4)';
  ctx.lineWidth=1;
  ctx.setLineDash([4,6]);
  ctx.beginPath();ctx.arc(cx,cy,orbitR,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // Sun at center
  ctx.save();
  const sunPulse=0.8+0.2*Math.sin(t*3);
  ctx.shadowColor='#ffaa00';ctx.shadowBlur=30*sunPulse;
  ctx.fillStyle='#ffcc33';
  ctx.beginPath();ctx.arc(cx,cy,18,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffeeaa';
  ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();
  ctx.restore();
  glowText('☀',cx,cy+1,'#ffcc33',14,0);

  // Build set of solved zodiac indices
  const solvedZodiacs=P4.solvedMonths.map(m=>MONTH_TO_ZODIAC[m]);

  // 12 zodiac positions on orbit (fixed)
  for(let i=0;i<12;i++){
    const a=Math.PI*2*i/12-Math.PI/2;
    const zx=cx+Math.cos(a)*orbitR, zy=cy+Math.sin(a)*orbitR;
    const isSolved=solvedZodiacs.includes(i);

    // Solved = glowing aura effect
    if(isSolved){
      const pulse=0.7+0.3*Math.sin(t*3+i);
      // Outer glow ring
      ctx.save();
      ctx.shadowColor=COLORS[i];ctx.shadowBlur=25*pulse;
      ctx.strokeStyle=COLORS[i];
      ctx.lineWidth=3;
      ctx.globalAlpha=0.5+0.3*pulse;
      ctx.beginPath();ctx.arc(zx,zy,22,0,Math.PI*2);ctx.stroke();
      ctx.restore();
      // Inner bright fill
      ctx.save();
      ctx.shadowColor=COLORS[i];ctx.shadowBlur=18;
      ctx.fillStyle=COLORS[i];
      ctx.globalAlpha=0.15+0.1*pulse;
      ctx.beginPath();ctx.arc(zx,zy,18,0,Math.PI*2);ctx.fill();
      ctx.restore();
      // Slot ring
      ctx.save();
      ctx.strokeStyle=COLORS[i];ctx.lineWidth=2;
      ctx.shadowColor=COLORS[i];ctx.shadowBlur=12;
      ctx.beginPath();ctx.arc(zx,zy,16,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    } else {
      ctx.save();
      ctx.strokeStyle='rgba(80,100,180,0.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(zx,zy,16,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
    // Zodiac icon
    drawZodiacIcon(zx,zy,i,isSolved?0.9:0.75,isSolved?COLORS[i]:null);
    // Name below
    ctx.save();
    ctx.textAlign='center';
    ctx.font="9px 'Malgun Gothic',sans-serif";
    ctx.fillStyle=isSolved?COLORS[i]:'rgba(100,120,180,0.5)';
    ctx.fillText(ZODIACS[i].name,zx,zy+26);
    ctx.restore();
  }

  // Earth — orbiting based on earthAngle
  const earthA=P4.earthAngle-Math.PI/2;
  const ex=cx+Math.cos(earthA)*orbitR, ey=cy+Math.sin(earthA)*orbitR;
  // Earth glow trail
  ctx.save();
  ctx.shadowColor='#44aaff';ctx.shadowBlur=20;
  ctx.fillStyle='#2266cc';
  ctx.beginPath();ctx.arc(ex,ey,12,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#44cc88';
  ctx.beginPath();ctx.arc(ex-3,ey-2,5,0,Math.PI*1.2);ctx.fill();
  ctx.fillStyle='#aaddff';
  ctx.beginPath();ctx.arc(ex+2,ey+3,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
  glowText('🌍',ex,ey+1,'#44aaff',12,0);

  // Pointer line from Earth to center (shows which zodiac Earth is opposite to)
  const oppA=earthA+Math.PI;
  const px=cx+Math.cos(oppA)*(orbitR+30), py=cy+Math.sin(oppA)*(orbitR+30);
  ctx.save();
  ctx.strokeStyle='rgba(255,220,100,0.3)';
  ctx.lineWidth=1;
  ctx.setLineDash([3,5]);
  ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(px,py);ctx.stroke();
  ctx.restore();

  // Current slot indicator
  const slot=P4.getCurrentSlot();
  const slotA=Math.PI*2*slot/12-Math.PI/2;
  const sx=cx+Math.cos(slotA)*orbitR, sy=cy+Math.sin(slotA)*orbitR;
  ctx.save();
  ctx.strokeStyle='rgba(255,220,100,0.6)';
  ctx.lineWidth=2;
  ctx.shadowColor='#ffdd88';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(sx,sy,22,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // Flash feedback
  if(P4.flashTimer>0){
    P4.flashTimer-=G.dt;
    const fa=Math.min(1,P4.flashTimer*3);
    ctx.save();ctx.globalAlpha=fa;
    glowText(P4.flashOk?'✓ 정답!':'✗ 다시!',W/2,cy+orbitR+50,P4.flashOk?'#44ff88':'#ff6666',18,12);
    ctx.restore();
  }

  // Progress + instructions
  glowText(`진행: ${P4.solvedMonths.length}/12`,W/2,H-38,'#667799',13,6);
  glowText('마우스 휠로 지구를 회전 → 클릭으로 확인',W/2,H-18,'#556677',11,4);
  drawCloseBtn();
}

// PUZZLE 5 RENDER — Draw the constellation
function renderP5(t){
  ctx.fillStyle='rgba(0,0,0,0.92)';
  ctx.fillRect(0,0,W,H);
  drawStars(t,0.5);
  const tgt=P5.target;
  if(!tgt)return;

  // Title
  glowText('별자리를 따라 별을 찍어라',W/2,28,'#aabbff',16,12);
  // Constellation name + symbol
  glowText(`${tgt.sym} ${tgt.name}`,W/2,54,tgt.col,18,14);

  const cellW=38,cellH=38;
  const gridW=cellW*P5.COLS, gridH=cellH*P5.ROWS;
  const gap=36;
  const leftOX=Math.round((W-gridW*2-gap)/2);
  const rightOX=leftOX+gridW+gap;
  const OY=78;

  // ── Left: Reference constellation ──
  glowText('원본',leftOX+gridW/2,OY-10,'#88aacc',12,6);
  // Grid lines (subtle)
  for(let gy=0;gy<P5.ROWS;gy++){
    for(let gx=0;gx<P5.COLS;gx++){
      ctx.save();
      ctx.strokeStyle='rgba(50,60,100,0.25)';
      ctx.lineWidth=1;
      ctx.strokeRect(leftOX+gx*cellW,OY+gy*cellH,cellW,cellH);
      ctx.restore();
    }
  }
  // Reference connection lines — draw THICK and BRIGHT so they're clearly visible
  ctx.save();
  ctx.shadowColor=tgt.col;
  ctx.shadowBlur=12;
  ctx.strokeStyle=tgt.col;
  ctx.globalAlpha=0.85;
  ctx.lineWidth=2.5;
  ctx.lineCap='round';
  tgt.lines.forEach(([a,b])=>{
    const sa=tgt.stars[a],sb=tgt.stars[b];
    ctx.beginPath();
    ctx.moveTo(leftOX+sa.x*cellW+cellW/2,OY+sa.y*cellH+cellH/2);
    ctx.lineTo(leftOX+sb.x*cellW+cellW/2,OY+sb.y*cellH+cellH/2);
    ctx.stroke();
  });
  ctx.restore();
  // Reference stars
  tgt.stars.forEach(s=>{
    const cx2=leftOX+s.x*cellW+cellW/2, cy2=OY+s.y*cellH+cellH/2;
    ctx.save();
    ctx.shadowColor=tgt.col; ctx.shadowBlur=16;
    ctx.fillStyle=tgt.col;
    ctx.beginPath();ctx.arc(cx2,cy2,7,0,Math.PI*2);ctx.fill();
    // Bright center
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(cx2,cy2,2.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // ── Divider ──
  ctx.save();
  ctx.strokeStyle='rgba(100,120,180,0.3)';
  ctx.lineWidth=1;
  ctx.setLineDash([4,6]);
  const divX=leftOX+gridW+gap/2;
  ctx.beginPath();ctx.moveTo(divX,OY-5);ctx.lineTo(divX,OY+gridH+5);ctx.stroke();
  ctx.restore();

  // ── Right: Player grid ──
  glowText('여기에 그리세요',rightOX+gridW/2,OY-10,'#88aacc',12,6);
  for(let gy=0;gy<P5.ROWS;gy++){
    for(let gx=0;gx<P5.COLS;gx++){
      const cx2=rightOX+gx*cellW+cellW/2;
      const cy2=OY+gy*cellH+cellH/2;
      const cell=P5.grid.find(c=>c.gx===gx&&c.gy===gy);
      const hover=mouse.x>=rightOX+gx*cellW&&mouse.x<rightOX+(gx+1)*cellW&&
                   mouse.y>=OY+gy*cellH&&mouse.y<OY+(gy+1)*cellH;
      // Grid cell
      ctx.save();
      ctx.strokeStyle=hover?'rgba(150,180,255,0.7)':'rgba(50,60,100,0.3)';
      ctx.lineWidth=hover?2:1;
      ctx.strokeRect(rightOX+gx*cellW,OY+gy*cellH,cellW,cellH);
      ctx.restore();

      // Ghost guide dot at target positions (faint hint)
      if(cell&&cell.correct&&!cell.lit){
        ctx.save();
        ctx.globalAlpha=0.18+0.07*Math.sin(t*2.5+gx+gy);
        ctx.strokeStyle=tgt.col;
        ctx.lineWidth=1;
        ctx.setLineDash([2,3]);
        ctx.beginPath();ctx.arc(cx2,cy2,6,0,Math.PI*2);ctx.stroke();
        ctx.restore();
      }

      // Lit star — green/correct or red/wrong
      if(cell&&cell.lit){
        const isCorrect=cell.correct;
        const starCol=isCorrect?'#aaccff':'#ff6666';
        ctx.save();
        ctx.shadowColor=starCol; ctx.shadowBlur=16;
        ctx.fillStyle=starCol;
        ctx.beginPath();ctx.arc(cx2,cy2,7,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
        ctx.fillStyle='#ffffff';
        ctx.beginPath();ctx.arc(cx2,cy2,2.5,0,Math.PI*2);ctx.fill();
        ctx.restore();
      } else if(hover){
        ctx.save();
        ctx.globalAlpha=0.3;
        ctx.fillStyle='#667799';
        ctx.beginPath();ctx.arc(cx2,cy2,5,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
    }
  }
  // Auto-draw lines between lit stars that form constellation connections
  ctx.save();
  ctx.shadowColor='#aaccff';
  ctx.shadowBlur=12;
  ctx.strokeStyle='#aaccff';
  ctx.globalAlpha=0.85;
  ctx.lineWidth=2.5;
  ctx.lineCap='round';
  tgt.lines.forEach(([a,b])=>{
    const sa=tgt.stars[a],sb=tgt.stars[b];
    const cellA=P5.grid.find(c=>c.gx===sa.x&&c.gy===sa.y);
    const cellB=P5.grid.find(c=>c.gx===sb.x&&c.gy===sb.y);
    if(cellA&&cellA.lit&&cellB&&cellB.lit){
      ctx.beginPath();
      ctx.moveTo(rightOX+sa.x*cellW+cellW/2,OY+sa.y*cellH+cellH/2);
      ctx.lineTo(rightOX+sb.x*cellW+cellW/2,OY+sb.y*cellH+cellH/2);
      ctx.stroke();
    }
  });
  ctx.restore();

  // Progress — show correct vs wrong count
  const correctCount=P5.grid.filter(c=>c.lit&&c.correct).length;
  const wrongCount=P5.grid.filter(c=>c.lit&&!c.correct).length;
  const starCount=tgt.stars.length;
  let progText=`정답: ${correctCount}/${starCount}`;
  if(wrongCount>0) progText+=`  오답: ${wrongCount}`;
  glowText(progText,W/2,OY+gridH+24,wrongCount>0?'#ff8866':'#667799',13,6);
  drawCloseBtn();
}

function drawCloseBtn(){
  const bx=10,by=10,bw=74,bh=32;
  const hover=mouse.x>=bx-4&&mouse.x<=bx+bw+4&&mouse.y>=by-4&&mouse.y<=by+bh+4;
  ctx.save();
  // Solid background so button is always visible
  ctx.fillStyle=hover?'rgba(30,30,80,0.9)':'rgba(0,0,20,0.7)';
  ctx.fillRect(bx,by,bw,bh);
  ctx.shadowColor='#4466aa';ctx.shadowBlur=hover?12:6;
  ctx.strokeStyle=hover?'#aaccff':'#5577bb';
  ctx.lineWidth=hover?2:1;
  ctx.strokeRect(bx,by,bw,bh);
  ctx.shadowBlur=0;
  ctx.font="14px 'Malgun Gothic',sans-serif";
  ctx.textAlign='center';
  ctx.fillStyle=hover?'#ffffff':'#aabbdd';
  ctx.fillText('닫기',bx+bw/2,by+bh*0.68);
  ctx.restore();
}
function isCloseBtnHit(){
  // Generous hitbox with 4px padding around the visual button
  return mouse.x>=6&&mouse.x<=88&&mouse.y>=6&&mouse.y<=46;
}

// ─── CUTSCENE ─────────────────────────────────────────────────────────────────
function initCutscene(){
  G.scene='cutscene';
  G.cutscenePhase=0;
  G.cutsceneTimer=0;
  Object.keys(keys).forEach(k=>keys[k]=false); // clear input buffer
  fadeIn();
}

function updateCutscene(dt){
  G.cutsceneTimer+=dt;
  // phases: 0=show book (3s), 1=show zodiac chart (4s), 2=fade out
  if(G.cutscenePhase===0&&G.cutsceneTimer>3){G.cutscenePhase=1;G.cutsceneTimer=0;}
  if(G.cutscenePhase===1&&G.cutsceneTimer>4){G.cutscenePhase=2;G.cutsceneTimer=0;}
  if(G.cutscenePhase===2&&G.cutsceneTimer>1.5){
    fadeOut(()=>{
      G.scene='tmi';
      showTMI(()=>{
        currentMap='map2';
        G.scene='map2';
        G.player={x:100,y:H/2,vx:0,vy:0,frame:0,frameTimer:0,facing:'right'};
        G.timerRunning=true;
        startBGM();
        fadeIn();
      });
    });
  }
}

function renderCutscene(t){
  ctx.fillStyle='#010508';
  ctx.fillRect(0,0,W,H);
  drawStars(t,0.3);
  if(G.cutscenePhase===0){
    // Book opening
    ctx.save();
    glow('#9955ff',20);
    ctx.fillStyle='#5522aa';
    ctx.fillRect(W/2-80,H/2-60,160,110);
    ctx.fillStyle='#7744cc';
    ctx.fillRect(W/2-76,H/2-56,152,102);
    ctx.fillStyle='#ccaaff';
    ctx.font='40px serif';ctx.textAlign='center';
    ctx.fillText('✦',W/2,H/2+15);
    ctx.restore();
    glowText('고서가 저절로 열린다...',W/2,H/2+90,'#9977cc',16,10);
  } else if(G.cutscenePhase===1){
    // Zodiac chart — all 13 slots (12 zodiacs + 1 empty) evenly spaced in a circle
    const cx=W/2, cy=H/2+10;
    const r=185;
    glowText('황도대의 별자리 — 비어 있는 자리',cx,45,'#aabbff',16,12);
    for(let i=0;i<13;i++){
      const a=Math.PI*2*i/13-Math.PI/2;
      const sx=cx+Math.cos(a)*r, sy=cy+Math.sin(a)*r;
      if(i<12){
        // Normal zodiac slots
        ctx.save();
        glow(COLORS[i],10);
        ctx.strokeStyle=COLORS[i];ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(sx,sy,18,0,Math.PI*2);ctx.stroke();
        ctx.restore();
        drawZodiacIcon(sx,sy,i,0.85);
      } else {
        // 13th empty slot — highlighted yellow dashed
        ctx.save();
        glow('#ffdd88',15+8*Math.sin(t*2));
        ctx.strokeStyle='rgba(255,220,100,0.6)';
        ctx.lineWidth=2;
        ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.arc(sx,sy,18,0,Math.PI*2);ctx.stroke();
        ctx.restore();
        glowText('?',sx,sy,'#ffdd88',20,15);
      }
    }
  }
}

// ─── DREAM SCENE (dithered pixel art vision) ─────────────────────────────────
function renderDreamScene(t,prog){
  // Sky gradient — pastel blue to white
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#aaddff');
  sky.addColorStop(0.6,'#ddeeff');
  sky.addColorStop(1,'#ffeedd');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,H);

  // Large cyan rectangular block (right side)
  ctx.fillStyle='#44ddff';
  ctx.fillRect(480,60,280,220);
  ctx.fillStyle='#33bbee';
  ctx.fillRect(520,120,200,180);

  // Blue circle blobs (left side)
  ctx.fillStyle='#6688ff';
  ctx.beginPath();ctx.arc(160,340,130,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#7799ff';
  ctx.beginPath();ctx.arc(100,420,100,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5577ee';
  ctx.beginPath();ctx.arc(240,480,80,0,Math.PI*2);ctx.fill();

  // Blue semicircles (bottom)
  ctx.fillStyle='#4477ee';
  ctx.beginPath();ctx.arc(300,600,120,Math.PI,0);ctx.fill();
  ctx.fillStyle='#5588ff';
  ctx.beginPath();ctx.arc(550,620,140,Math.PI,0);ctx.fill();

  // Pink/magenta triangle shapes (center-left)
  ctx.fillStyle='#ff77aa';
  ctx.beginPath();ctx.moveTo(250,380);ctx.lineTo(380,140);ctx.lineTo(500,380);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ff88bb';
  ctx.beginPath();ctx.moveTo(180,420);ctx.lineTo(300,220);ctx.lineTo(420,420);ctx.closePath();ctx.fill();

  // Golden/yellow sun burst (top center)
  ctx.save();
  ctx.translate(420,80);
  ctx.rotate(t*0.3);
  ctx.fillStyle='#ffdd44';
  ctx.beginPath();
  for(let i=0;i<16;i++){
    const a=Math.PI*2*i/16;
    const r=i%2===0?70:35;
    if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();ctx.fill();
  // Inner glow
  ctx.fillStyle='#ffeeaa';
  ctx.beginPath();ctx.arc(0,0,25,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Yellow/orange warm shape (center)
  ctx.fillStyle='#ffcc44';
  ctx.beginPath();ctx.arc(400,280,70,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffaa33';
  ctx.fillRect(360,280,80,120);

  // Beige/tan tower (center-bottom)
  const towerGrad=ctx.createLinearGradient(340,280,460,600);
  towerGrad.addColorStop(0,'#eedd99');
  towerGrad.addColorStop(1,'#ccaa66');
  ctx.fillStyle=towerGrad;
  ctx.fillRect(340,300,120,300);
  // Tower highlight
  ctx.fillStyle='#ffeecc';
  ctx.fillRect(350,310,40,280);

  // Cyan blob (right-center)
  ctx.fillStyle='#55eeff';
  ctx.beginPath();ctx.arc(620,280,110,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#66ffff';
  ctx.beginPath();ctx.arc(680,200,80,0,Math.PI*2);ctx.fill();

  // Pink blob (right)
  ctx.fillStyle='#ff99cc';
  ctx.beginPath();ctx.arc(580,400,90,0,Math.PI*2);ctx.fill();

  // Small purple accents
  ctx.fillStyle='#aa77ff';
  ctx.beginPath();ctx.arc(320,200,40,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#cc88ff';
  ctx.beginPath();ctx.moveTo(280,280);ctx.lineTo(320,200);ctx.lineTo(360,280);ctx.closePath();ctx.fill();

  // Green stars scattered
  const starPositions=[[400,340],[200,250],[600,350],[150,180],[500,450],[700,150]];
  starPositions.forEach(([sx,sy],i)=>{
    const bob=Math.sin(t*2+i*1.3)*5;
    drawStar5(sx,sy+bob,10+Math.sin(t+i)*3,'#44ee88');
  });

  // === DITHERING OVERLAY — gives pixel art / retro look ===
  // Pass 1: white dots in checkerboard (creates the dithered highlight)
  ctx.fillStyle='rgba(255,255,255,0.18)';
  for(let x=0;x<W;x+=4){
    for(let y=0;y<H;y+=4){
      if((x/4+y/4)%2===0) ctx.fillRect(x,y,2,2);
    }
  }
  // Pass 2: darker dots in offset checkerboard (creates depth)
  ctx.fillStyle='rgba(0,0,30,0.08)';
  for(let x=2;x<W;x+=4){
    for(let y=2;y<H;y+=4){
      if((x/4+y/4)%2===0) ctx.fillRect(x,y,2,2);
    }
  }

  // White sparkle particles floating
  for(let i=0;i<20;i++){
    const sx=(i*137+t*30)%W;
    const sy=(i*97+Math.sin(t+i)*40)%H;
    const bright=0.4+0.6*Math.abs(Math.sin(t*1.5+i*0.8));
    ctx.save();
    ctx.globalAlpha=bright*prog;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(sx-1,sy-1,3,3);
    ctx.restore();
  }

  // Fade in/out based on progress
  if(prog<0.3){
    ctx.fillStyle=`rgba(255,255,255,${1-prog/0.3})`;
    ctx.fillRect(0,0,W,H);
  }
  if(prog>0.8){
    ctx.fillStyle=`rgba(0,0,0,${(prog-0.8)/0.2})`;
    ctx.fillRect(0,0,W,H);
  }

  // Text overlay
  if(prog>0.2&&prog<0.85){
    const ta=Math.min(1,(prog-0.2)/0.2)*Math.min(1,(0.85-prog)/0.1);
    ctx.save();ctx.globalAlpha=ta;
    glowText('기억의 조각이 스쳐간다...',W/2,H-50,'#ffffff',16,10);
    ctx.restore();
  }
}

function renderTransit(t){
  const phase=G.transitPhase;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(phase===0){return;}
  // Phase 1: smooth white flash fading to starfield
  if(phase===1){
    const prog=Math.min(1,G.transitTimer/1.0);
    drawStars(t,prog*0.7);
    ctx.save();
    ctx.globalAlpha=Math.max(0,1-prog*1.4);
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  // Phase 2: ★ DREAM SCENE — colorful dithered pixel art vision ★
  if(phase===2){
    const prog=Math.min(1,G.transitTimer/2.5);
    renderDreamScene(t,prog);
  }
  // Phase 3: stars with soft nebula bloom
  if(phase===3){
    const prog=Math.min(1,G.transitTimer/1.0);
    ctx.fillStyle='#050315';ctx.fillRect(0,0,W,H);
    drawStars(t,0.8);
    drawAmbient();
    ctx.save();
    const nb=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,280);
    nb.addColorStop(0,`rgba(100,40,200,${0.4*prog})`);
    nb.addColorStop(0.5,`rgba(40,20,100,${0.2*prog})`);
    nb.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=nb;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  // Phase 4: stabilizing, character awakens
  if(phase===4){
    ctx.fillStyle='#030a18';ctx.fillRect(0,0,W,H);
    drawStars(t,1.0);
    drawAmbient();
    const prog=Math.min(1,G.transitTimer/1.0);
    ctx.save();
    ctx.globalAlpha=prog;
    drawPlayer(W/2,H/2,0,true,t);
    ctx.restore();
    glowText('눈을 뜨다...',W/2,H-80,'#aabbff',16,12);
  }
}

// ─── ENDING ───────────────────────────────────────────────────────────────────
function initEnding(){
  G.scene='ending';
  G.endingPhase=0;
  G.endingTimer=0;
  G.timerRunning=false;
  G.finalTime=eggBonusApplied?Math.max(0,G.timer-5):G.timer;
  G.player.isAwakened=true;
  Object.keys(keys).forEach(k=>keys[k]=false);
  stopBGM();
  spawnBurst(W/2,H/2,30,{spread:300,life:3,size:4,color:'#aaccff'});
  triggerFlash(0.9);
  triggerShake(0.5,8);
  playEndingBGM();
}

function updateEnding(dt){
  G.endingTimer+=dt;
  // Phase 0: zodiac circle breaking (2s)
  if(G.endingPhase===0&&G.endingTimer>2){G.endingPhase=1;G.endingTimer=0;
    spawnBurst(W/2,H/2,40,{spread:350,life:4,size:3,color:'#ffdd88'});
  }
  // Phase 1: 13 reform (3s)
  if(G.endingPhase===1&&G.endingTimer>3){G.endingPhase=2;G.endingTimer=0;}
  // Phase 2: text (3s)
  if(G.endingPhase===2&&G.endingTimer>3){G.endingPhase=3;G.endingTimer=0;}
  // Phase 3: character (2s) → credits (if cat seen) or result
  if(G.endingPhase===3&&G.endingTimer>2){
    if(CAT.triggered){G.scene='credits';G.creditsTimer=0;}
    else G.scene='result';
  }
}

function renderEnding(t){
  ctx.fillStyle='#010510';ctx.fillRect(0,0,W,H);
  drawStars(t,1.0);
  drawAmbient();
  const cx=W/2, cy=H/2;

  // Phase 0: zodiac circle breaking
  if(G.endingPhase===0){
    const prog=G.endingTimer/2;
    for(let i=0;i<12;i++){
      const a=Math.PI*2*i/12-Math.PI/2;
      const r=180+(prog*80);
      const alpha=Math.max(0,1-prog);
      ctx.save();ctx.globalAlpha=alpha;
      glow(COLORS[i],12);
      ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=COLORS[i];
      ctx.fillText(ZODIACS[i].sym,cx+Math.cos(a)*r,cy+Math.sin(a)*r);
      ctx.restore();
    }
  }
  // Phase 1: 13 reform
  if(G.endingPhase>=1){
    const prog=Math.min(1,G.endingPhase===1?G.endingTimer/3:1);
    for(let i=0;i<13;i++){
      const a=Math.PI*2*i/13-Math.PI/2;
      const r=180;
      ctx.save();
      ctx.globalAlpha=Math.min(1,(prog*(i+1)/13)*2);
      glow(i<12?COLORS[i]:'#ffdd88',i===12?20:10);
      if(i<12){
        ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle=COLORS[i];
        ctx.fillText(ZODIACS[i].sym,cx+Math.cos(a)*r,cy+Math.sin(a)*r);
      } else {
        // 13th — Ophiuchus (뱀주인자리)
        const ox=cx+Math.cos(a)*r, oy=cy+Math.sin(a)*r;
        glow('#ffdd88',20);
        ctx.font='26px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#ffdd88';
        ctx.fillText('⛎',ox,oy);
      }
      ctx.restore();
    }
  }
  // Phase 2: text (fade in once, stays visible in phase 3)
  if(G.endingPhase===2){
    const alpha=Math.min(1,G.endingTimer/1.5);
    ctx.save();ctx.globalAlpha=alpha;
    glowText('너는 왜 열두 개라고 믿었지?',cx,cy-60,'#aaccff',20,15);
    glowText('비어 있던 자리는, 언제나 하나였다.',cx,cy+60,'#ffdd88',18,12);
    ctx.restore();
  }
  if(G.endingPhase===3){
    // Text stays fully visible (no re-fade)
    glowText('너는 왜 열두 개라고 믿었지?',cx,cy-60,'#aaccff',20,15);
    glowText('비어 있던 자리는, 언제나 하나였다.',cx,cy+60,'#ffdd88',18,12);
    // Character fades in
    const alpha=Math.min(1,G.endingTimer/1.5);
    ctx.save();ctx.globalAlpha=alpha;
    drawPlayer(cx,cy+40,0,true,t);
    ctx.restore();
  }
  drawParticles();
}

function renderCredits(t){

  let totalH=0;
  CREDITS_LINES.forEach(l=>{totalH+=l.size+l.gap;});

  // Scroll speed: starts from bottom, scrolls up
  const scrollSpeed=30; // pixels per second
  const scrollY=H+50-G.creditsTimer*scrollSpeed;

  let y=scrollY;
  CREDITS_LINES.forEach(line=>{

      glowText(line.text,W/2,y,line.color,line.size,line.size>20?15:8);

    y+=line.size+line.gap;
  });

  // When credits fully scrolled, go to result
  if(scrollY+totalH<-50){
    G.scene='result';
  }

  // Skip hint (subtle, appears after 3s)
  if(G.creditsTimer>3){
    ctx.save();
    ctx.globalAlpha=0.3;

// ─── PUZZLE INPUT HANDLING ────────────────────────────────────────────────────
function handleP1Input(){
  const cx=W/2,cy=H/2;
  if(mouse.justDown){
    if(isCloseBtnHit()){P1.active=false;G.scene='map2';G._returnedFromPuzzle=true;return;}
    // Check scattered items
    for(const item of P1.scattered){
      const dx=mouse.x-item.x,dy=mouse.y-item.y;
      if(dx*dx+dy*dy<20*20){
        P1.dragging={zodiacIdx:item.zodiacIdx,ox:dx,oy:dy};
        return;
      }
    }
    // Check placed items in slots
    for(const slot of P1.slots){
      if(slot.zodiacIdx>=0){
        const dx=mouse.x-slot.x,dy=mouse.y-slot.y;
        if(dx*dx+dy*dy<22*22){
          // Pick up from slot
          P1.scattered.push({zodiacIdx:slot.zodiacIdx,x:slot.x,y:slot.y});
          P1.dragging={zodiacIdx:slot.zodiacIdx,ox:0,oy:0};
          slot.zodiacIdx=-1;
          return;
        }
      }
    }
  }
  if(mouse.justUp&&P1.dragging){
    // Drop near a slot?
    let dropped=false;
    for(const slot of P1.slots){
      const dx=mouse.x-slot.x,dy=mouse.y-slot.y;
      if(dx*dx+dy*dy<28*28){
        // If slot occupied, swap
        if(slot.zodiacIdx>=0){
          P1.scattered.push({zodiacIdx:slot.zodiacIdx,x:slot.x,y:slot.y});
        }
        // Remove from scattered
        const idx=P1.scattered.findIndex(it=>it.zodiacIdx===P1.dragging.zodiacIdx);
        if(idx>=0)P1.scattered.splice(idx,1);
        slot.zodiacIdx=P1.dragging.zodiacIdx;
        dropped=true;
        spawnBurst(slot.x,slot.y,6,{spread:40,life:0.8,size:2,color:COLORS[P1.dragging.zodiacIdx]});
        break;
      }
    }
    if(!dropped){
      // Drop back to scattered
      const item=P1.scattered.find(it=>it.zodiacIdx===P1.dragging.zodiacIdx);
      if(item){item.x=mouse.x;item.y=mouse.y;}
    }
    P1.dragging=null;
    // Check solve
    if(P1.check()){
      P1.solved=true;G.puzzles[0]=true;P1.active=false;
      G.scene='map2';G.player.vx=0;G.player.vy=0;G._returnedFromPuzzle=true;
      // Unlock door and remove center obstacle wall
      MAPS.map2.doorLocked=false;
      MAPS.map2.walls=MAPS.map2.walls.filter(w=>!(w.x===300&&w.y===250&&w.w===200&&w.h===120));
      playSuccess();
      triggerShake(0.4,5);
      spawnBurst(W/2,H/2,30,{spread:200,life:2,size:3,color:'#aaccff'});
      showMessage('시간은 순환한다. 그러나 하나는 순환하지 않는다.',4,'#aabbff');
    }
  }
}

// ─── PLAYER UPDATE ────────────────────────────────────────────────────────────
function isPuzzleSolved(id){
  const map={'puzzle1':0,'puzzle2':1,'puzzle3':2,'puzzle5':4};
  return (id in map)&&G.puzzles[map[id]];
}

function updatePlayer(dt){
  const p=G.player;
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
  if(keys['ArrowRight']||keys['KeyD'])dx=1;
  if(keys['ArrowUp']||keys['KeyW'])dy=-1;
  if(keys['ArrowDown']||keys['KeyS'])dy=1;
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len>0){dx/=len;dy/=len;} // normalize — prevents slower diagonal movement
  p.vx=dx*180; p.vy=dy*180;  // increased speed
  const newX=p.x+p.vx*dt;
  const newY=p.y+p.vy*dt;
  // Resolve walls
  const map=MAPS[currentMap];
  const PW=16,PH=20;
  const res=resolveWalls(newX-PW/2,newY-PH/2,PW,PH,map);
  p.x=res.x+PW/2;
  p.y=res.y+PH/2;
  // Clamp
  p.x=Math.max(50,Math.min(W-50,p.x));
  p.y=Math.max(60,Math.min(H-50,p.y));
  // Animation
  if(dx!==0||dy!==0){
    p.frameTimer+=dt;
    if(p.frameTimer>0.12){p.frameTimer=0;p.frame=(p.frame+1)%8;}
    if(dx<0)p.facing='left';
    if(dx>0)p.facing='right';
    if(dy<0)p.facing='up';
    if(dy>0)p.facing='down';
    // Tiny particle trail
    if(Math.random()<0.1){
      spawnParticle(p.x,p.y,{spread:20,life:0.5,size:1.5,color:'rgba(100,120,200,0.5)'});
    }
  }
  // Check interact — skip already-solved puzzles
  G.showInteract=false;
  G.interactTarget=null;
  for(const obj of map.interactables){
    if(isPuzzleSolved(obj.id))continue;
    if(p.x>=obj.x-30&&p.x<=obj.x+obj.w+30&&p.y>=obj.y-30&&p.y<=obj.y+obj.h+30){
      const isShelf=obj.id.startsWith('shelf_');
      if(isShelf){
        // Easter egg shelves: Q key only
        G.showInteract=true;
        G.interactTarget=obj;
        if(keys['KeyQ']&&!G._qHeld){G._qHeld=true;handleInteract(obj);}
      } else {
        // Normal interactables: E / Space
        G.showInteract=true;
        G.interactTarget=obj;
        if((keys['KeyE']||keys['Space'])&&!G._eHeld){G._eHeld=true;handleInteract(obj);}
      }
      break;
    }
  }
  if(!keys['KeyE']&&!keys['Space'])G._eHeld=false;
  if(!keys['KeyQ'])G._qHeld=false;
  // Check exits — guard against duplicate transitions
  if(!G.transitioning){
    for(const ex of map.exits){
      if(!ex.locked||G.puzzles[ex.puzzle]){
        if(p.x>=ex.x&&p.x<=ex.x+ex.w&&p.y>=ex.y&&p.y<=ex.y+ex.h){
          if(ex.to==='transit'){
            G.transitioning=true;
            fadeOut(()=>{
              G.scene='tmi';
              showTMI(()=>{initTransit();G.transitioning=false;});
            });
          } else {
            G.transitioning=true;
            fadeOut(()=>{
              G.scene='tmi';
              const _to=ex.to,_px=ex.px,_py=ex.py;
              showTMI(()=>{
                currentMap=_to;
                G.scene=_to;
                G.player.x=_px;G.player.y=_py;
                G.transitioning=false;
                fadeIn();
              });
            });
          }
        }
      }
    }
  }
}

// ─── BLACK CAT EASTER EGG (fullscreen cutscene — slow, cinematic, close-up) ─
const CAT={
  active:false, triggered:false, timer:0, phase:0,
  catX:0, catY:0, frame:0, frameTimer:0,
  // Phases: 0=fadein(2s), 1=eyes(3s), 2=walk(5s), 3=closeup+stare(4s), 4=vanish(3s), 5=fadeout(2.5s)
};
function triggerCatScene(){
  if(CAT.triggered){showMessage('...아까 그 고양이는 어디로 갔을까?',2,'#aa88cc');return;}
  CAT.triggered=true;CAT.active=true;CAT.phase=0;CAT.timer=0;
  CAT.catX=-80;CAT.catY=H/2+80;CAT.frame=0;CAT.frameTimer=0;
  G.scene='catscene';initAudio();
}
function updateCatScene(dt){
  if(!CAT.active)return;
  CAT.timer+=dt;
  CAT.frameTimer+=dt;
  if(CAT.frameTimer>0.15){CAT.frameTimer=0;CAT.frame=(CAT.frame+1)%4;}
  const p=CAT.phase;
  if(p===0&&CAT.timer>2.0){CAT.phase=1;CAT.timer=0;playNote(NOTE.E3,0.4,0.03,'sine');}
  if(p===1&&CAT.timer>3.0){CAT.phase=2;CAT.timer=0;playNote(NOTE.A3,0.3,0.04,'sine');}
  if(p===2){
    CAT.catX+=65*dt;
    // Soft footstep rhythm
    const beat=Math.floor(CAT.timer*2.5);
    if(beat!==Math.floor((CAT.timer-dt)*2.5))playNote(NOTE.B3+beat*5,0.1,0.02,'sine');
    if(CAT.timer>5.0){CAT.phase=3;CAT.timer=0;CAT.catX=W/2+40;}
  }
  if(p===3&&CAT.timer>4.0){CAT.phase=4;CAT.timer=0;
    spawnBurst(W/2,H/2,30,{spread:150,life:2.5,size:4,color:'#8844cc'});
    spawnBurst(W/2,H/2,20,{spread:100,life:2,size:3,color:'#ffdd44'});
    playNote(NOTE.E5,0.8,0.08,'sine');playNote(NOTE.G5,0.5,0.06,'sine',0.2);
  }
  if(p===4&&CAT.timer>3.0){CAT.phase=5;CAT.timer=0;}
  if(p===5&&CAT.timer>2.5){CAT.active=false;initJumpMap();}
}

// Draw a detailed pixel-art cat at (cx,cy) with scale S, facing direction dir(1=right,-1=left)
function drawPixelCat(cx,cy,S,dir,t,walking,eyeIntensity){
  ctx.save();
  ctx.translate(cx,cy);
  if(dir<0)ctx.scale(-1,1);

  const bc='#0e0e14'; // body black
  const bc2='#161620'; // body highlight
  const fur='#1a1a26'; // fur detail
  const nose='#443344';
  const f=CAT.frame;

  // Shadow on ground
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(0,28*S,22*S,5*S,0,0,Math.PI*2);ctx.fill();

  // Tail — flowing curve
  const tw1=Math.sin(t*2.5)*10*S, tw2=Math.sin(t*2.5+0.8)*8*S;
  ctx.strokeStyle=bc;ctx.lineWidth=4*S;ctx.lineCap='round';
  ctx.shadowColor='#6633aa';ctx.shadowBlur=3*S;
  ctx.beginPath();
  ctx.moveTo(-18*S,5*S);
  ctx.bezierCurveTo(-30*S,-5*S+tw1,-38*S,-20*S+tw2,-32*S,-35*S+tw1);
  ctx.stroke();
  ctx.shadowBlur=0;

  // Back legs
  ctx.fillStyle=bc;
  if(walking){
    const s=Math.sin(t*8), c=Math.cos(t*8);
    ctx.fillRect(-12*S,18*S,5*S,12*S+s*3*S);
    ctx.fillRect(-4*S,18*S,5*S,12*S+c*3*S);
  } else {
    ctx.fillRect(-12*S,18*S,5*S,12*S);
    ctx.fillRect(-4*S,18*S,5*S,12*S);
  }

  // Body — elongated oval
  ctx.fillStyle=bc;
  ctx.shadowColor='#332255';ctx.shadowBlur=6*S;
  ctx.beginPath();ctx.ellipse(0,6*S,22*S,14*S,-0.05,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Body fur shine
  ctx.fillStyle=bc2;
  ctx.beginPath();ctx.ellipse(2*S,2*S,14*S,8*S,-0.05,0,Math.PI*2);ctx.fill();

  // Front legs
  ctx.fillStyle=bc;
  if(walking){
    const s=Math.sin(t*8+Math.PI), c=Math.cos(t*8+Math.PI);
    ctx.fillRect(8*S,18*S,5*S,12*S+s*3*S);
    ctx.fillRect(15*S,18*S,5*S,12*S+c*3*S);
    // Paws
    ctx.fillStyle=fur;
    ctx.fillRect(7*S,29*S+s*3*S,7*S,3*S);
    ctx.fillRect(14*S,29*S+c*3*S,7*S,3*S);
  } else {
    ctx.fillRect(8*S,18*S,5*S,12*S);
    ctx.fillRect(15*S,18*S,5*S,12*S);
    ctx.fillStyle=fur;
    ctx.fillRect(7*S,29*S,7*S,3*S);
    ctx.fillRect(14*S,29*S,7*S,3*S);
  }

  // Neck
  ctx.fillStyle=bc;
  ctx.fillRect(16*S,-4*S,10*S,14*S);

  // Head — round
  const hx=24*S, hy=-10*S;
  ctx.fillStyle=bc;
  ctx.shadowColor='#332255';ctx.shadowBlur=4*S;
  ctx.beginPath();ctx.ellipse(hx,hy,13*S,11*S,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Cheeks / fur highlight
  ctx.fillStyle=bc2;
  ctx.beginPath();ctx.ellipse(hx+1*S,hy+2*S,9*S,7*S,0,0,Math.PI*2);ctx.fill();

  // Ears — tall triangles
  ctx.fillStyle=bc;
  ctx.beginPath();ctx.moveTo(hx-9*S,hy-8*S);ctx.lineTo(hx-5*S,hy-24*S);ctx.lineTo(hx-1*S,hy-8*S);ctx.fill();
  ctx.beginPath();ctx.moveTo(hx+1*S,hy-8*S);ctx.lineTo(hx+5*S,hy-24*S);ctx.lineTo(hx+9*S,hy-8*S);ctx.fill();
  // Inner ears — pink
  ctx.fillStyle='#2a1a2a';
  ctx.beginPath();ctx.moveTo(hx-7*S,hy-9*S);ctx.lineTo(hx-5*S,hy-20*S);ctx.lineTo(hx-2*S,hy-9*S);ctx.fill();
  ctx.beginPath();ctx.moveTo(hx+2*S,hy-9*S);ctx.lineTo(hx+5*S,hy-20*S);ctx.lineTo(hx+7*S,hy-9*S);ctx.fill();

  // Eyes — almond shaped with slit pupils
  const ep=eyeIntensity;
  const blink=(Math.sin(t*0.7)>0.97)?0:1; // rare slow blink
  ctx.save();
  ctx.globalAlpha=blink;
  // Eye whites (dark)
  ctx.fillStyle='#1a2a1a';
  ctx.beginPath();ctx.ellipse(hx-5*S,hy-1*S,4*S,3*S,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(hx+5*S,hy-1*S,4*S,3*S,0,0,Math.PI*2);ctx.fill();
  // Iris — glowing yellow-green
  ctx.shadowColor=ep>0.7?'#ffdd00':'#88aa22';
  ctx.shadowBlur=ep*15*S;
  ctx.fillStyle=ep>0.7?`rgba(255,221,0,${ep})`:`rgba(136,170,34,${0.5+ep*0.5})`;
  ctx.beginPath();ctx.ellipse(hx-5*S,hy-1*S,3*S,2.5*S,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(hx+5*S,hy-1*S,3*S,2.5*S,0,0,Math.PI*2);ctx.fill();
  // Slit pupils
  ctx.shadowBlur=0;ctx.fillStyle='#000';
  ctx.fillRect(hx-5.5*S,hy-3*S,1*S,4.5*S);
  ctx.fillRect(hx+4.5*S,hy-3*S,1*S,4.5*S);
  ctx.restore();

  // Nose — small triangle
  ctx.fillStyle=nose;
  ctx.beginPath();ctx.moveTo(hx-1*S,hy+4*S);ctx.lineTo(hx,hy+2.5*S);ctx.lineTo(hx+1*S,hy+4*S);ctx.fill();
  // Mouth line
  ctx.strokeStyle='#2a1a2a';ctx.lineWidth=1*S;
  ctx.beginPath();ctx.moveTo(hx,hy+4*S);ctx.lineTo(hx-2*S,hy+6*S);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hx,hy+4*S);ctx.lineTo(hx+2*S,hy+6*S);ctx.stroke();

  // Whiskers
  ctx.strokeStyle='#444455';ctx.lineWidth=0.8*S;
  const ww=Math.sin(t*1.5)*1*S; // subtle whisker twitch
  ctx.beginPath();ctx.moveTo(hx-8*S,hy+3*S);ctx.lineTo(hx-22*S,hy+ww);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hx-8*S,hy+5*S);ctx.lineTo(hx-21*S,hy+5*S+ww);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hx-7*S,hy+6*S);ctx.lineTo(hx-20*S,hy+9*S+ww);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hx+8*S,hy+3*S);ctx.lineTo(hx+22*S,hy+ww);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hx+8*S,hy+5*S);ctx.lineTo(hx+21*S,hy+5*S+ww);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hx+7*S,hy+6*S);ctx.lineTo(hx+20*S,hy+9*S+ww);ctx.stroke();

  ctx.restore();
}

function renderCatScene(t){
  ctx.fillStyle='#060410';ctx.fillRect(0,0,W,H);
  const p=CAT.phase, tm=CAT.timer;
  drawStars(t,0.12);
  // Library silhouette
  ctx.fillStyle='#0a0815';
  ctx.fillRect(20,50,120,500);ctx.fillRect(660,50,120,500);
  ctx.strokeStyle='#1a1225';ctx.lineWidth=1;
  for(let y=80;y<500;y+=50){
    ctx.beginPath();ctx.moveTo(20,y);ctx.lineTo(140,y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(660,y);ctx.lineTo(780,y);ctx.stroke();
  }
  ctx.fillStyle='#0d0a14';ctx.fillRect(0,H/2+100,W,200);
  // Dust motes
  for(let i=0;i<12;i++){
    const dx=(i*97+t*6)%W, dy=(i*131+Math.sin(t*0.4+i)*25)%H;
    ctx.save();ctx.globalAlpha=0.12;ctx.fillStyle='#443355';ctx.fillRect(dx,dy,2,2);ctx.restore();
  }

  // ── Phase 0: Slow fade in + text ──
  if(p===0){
    ctx.fillStyle=`rgba(0,0,0,${Math.max(0,1-tm/1.5)})`;ctx.fillRect(0,0,W,H);
    if(tm>1.0){
      const a=Math.min(1,(tm-1.0)/1.0);
      ctx.save();ctx.globalAlpha=a*0.7;
      glowText('...어디선가 기척이 느껴진다.',W/2,H/2-40,'#887799',16,10);
      ctx.restore();
    }
  }

  // ── Phase 1: Eyes glow in darkness (3s) ──
  if(p===1){
    const eyeA=Math.min(1,tm/1.0);
    const blink=(tm>1.8&&tm<2.0)?0:(tm>2.4&&tm<2.55)?0:1;
    const ex=200,ey=H/2+40;
    ctx.save();ctx.globalAlpha=eyeA*blink;
    ctx.shadowColor='#ffdd00';ctx.shadowBlur=20;
    ctx.fillStyle='#ffdd00';
    ctx.beginPath();ctx.ellipse(ex,ey,5,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ex+16,ey,5,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='#000';
    ctx.fillRect(ex-1,ey-3,2,7);ctx.fillRect(ex+15,ey-3,2,7);
    ctx.restore();
    if(tm>1.5){
      const a=Math.min(1,(tm-1.5)/1.0);
      ctx.save();ctx.globalAlpha=a*0.6;
      glowText('...!',W/2,H/2-70,'#ccaadd',20,12);
      ctx.restore();
    }
  }

  // ── Phase 2: Cat walks across (5s) — medium scale ──
  if(p===2){
    drawPixelCat(CAT.catX,CAT.catY,2.5,1,t,true,0.5);
  }

  // ── Phase 3: Close-up — cat stops, turns, stares (4s) ──
  if(p===3){
    // Zoom in: cat fills center of screen, facing left (toward player)
    const zoomProg=Math.min(1,tm/1.0);
    const S=2.5+zoomProg*1.8; // scale 2.5 → 4.3
    const ccx=W/2+40-zoomProg*40;
    const ccy=H/2+30+zoomProg*20;
    const eyeGlow=0.5+0.5*Math.min(1,tm/1.5);
    drawPixelCat(ccx,ccy,S,-1,t,false,eyeGlow);

    // Text
    if(tm>1.2){
      const a=Math.min(1,(tm-1.2)/1.0);
      ctx.save();ctx.globalAlpha=a;
      glowText('검은 고양이가 당신을 바라보고 있다.',W/2,H-80,'#aa88cc',16,12);
      ctx.restore();
    }
    if(tm>2.8){
      const a=Math.min(1,(tm-2.8)/0.8);
      ctx.save();ctx.globalAlpha=a*0.8;
      glowText('⛎',ccx,ccy-70*S/4,'#ffdd88',28,20);
      ctx.restore();
    }
  }

  // ── Phase 4: Vanish in particles (3s) ──
  if(p===4){
    const va=Math.max(0,1-tm/1.5);
    if(va>0){
      ctx.save();ctx.globalAlpha=va;
      drawPixelCat(W/2,H/2+50,4,-1,t,false,1.0);
      ctx.restore();
    }
    // Sparkle ring
    for(let i=0;i<12;i++){
      const sa=t*2+i*Math.PI*2/12;
      const sr=30+tm*60;
      const sx=W/2+Math.cos(sa)*sr, sy=H/2+40+Math.sin(sa)*sr*0.5;
      ctx.save();
      ctx.globalAlpha=Math.max(0,0.8-tm*0.25);
      ctx.fillStyle=i%3===0?'#ffdd44':i%3===1?'#8844cc':'#aaccff';
      ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=10;
      const ss=3+Math.sin(t*4+i)*2;
      ctx.fillRect(sx-ss/2,sy-ss/2,ss,ss);
      ctx.restore();
    }
    if(tm>1.0){
      const a=Math.min(1,(tm-1.0)/1.0);
      ctx.save();ctx.globalAlpha=a*0.7;
      glowText('그림자 속으로 사라졌다...',W/2,H-70,'#887799',14,8);
      ctx.restore();
    }
  }

  drawParticles();

  // ── Phase 5: Fade to black + final text (2.5s) ──
  if(p===5){
    const a=Math.min(1,tm/1.2);
    ctx.fillStyle=`rgba(0,0,0,${a})`;ctx.fillRect(0,0,W,H);
    if(tm>0.8&&tm<2.2){
      const ta=Math.min(1,(tm-0.8)/0.8)*Math.min(1,(2.2-tm)/0.5);
      ctx.save();ctx.globalAlpha=ta;
      glowText('웬 고양이? 관리인이 관리를 어떻게 하는 거야...',W/2,H/2,'#aa88cc',16,12);
      ctx.restore();
    }
  }
}

  // Final platform

}
function updateJumpMap(dt){
  if(!JMP.active||JMP.won)return;
  JMP.timer+=dt;

  // Cat taunt intro — freezes player input for ~3 seconds
  if(JMP.catIntro){
    JMP.catIntroTimer+=dt;
    if(JMP.catIntroTimer<1.5){
      // Cat sits and looks at player
    } else if(JMP.catIntroTimer<3.0){
      // Cat rockets upward
      JMP.catY-=600*dt;
    } else {
      JMP.catIntro=false;
    }
    return; // Block player input during intro
  }

  // Bird mode activation: S key, one-time use
  if(keys['KeyS']&&!JMP.birdUsed&&!JMP.birdMode){
    JMP.birdMode=true;JMP.birdTimer=30;JMP.birdUsed=true;
    JMP.vy=0;
    spawnBurst(JMP.px,JMP.py,15,{spread:80,life:1,size:3,color:'#88ddff'});
    playNote(NOTE.G5,0.4,0.1,'sine');
    playNote(NOTE.C5,0.3,0.08,'sine',0.1);
  }
  // Bird mode timer
  if(JMP.birdMode){
    JMP.birdTimer-=dt;
    if(JMP.birdTimer<=0){
      JMP.birdMode=false;
      spawnBurst(JMP.px,JMP.py,10,{spread:50,life:0.8,size:2,color:'#ffaa44'});
    }
  }

  const SPD=JMP.birdMode?250:210;
  // Input
  let dx=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
  if(keys['ArrowRight']||keys['KeyD'])dx=1;
  JMP.px+=dx*SPD*dt;
  JMP.px=Math.max(15,Math.min(W-15,JMP.px));

  if(JMP.birdMode){
    // Bird: free flight — up/down with arrows
    let dy=0;
    if(keys['ArrowUp']||keys['KeyW']||keys['Space'])dy=-1;
    if(keys['ArrowDown']||keys['KeyS']){}// S already used, ignore for down
    if(keys['ArrowDown'])dy=1;
    JMP.vy=dy*200;
    JMP.py+=JMP.vy*dt;
    // Gentle gravity so bird slowly descends when idle
    if(dy===0)JMP.py+=30*dt;
    JMP.onGround=false;
  } else {
    // Normal: gravity + jump
    const GRAV=800;
    const JUMP=-460;
    if((keys['ArrowUp']||keys['KeyW']||keys['Space'])&&JMP.onGround){
      JMP.vy=JUMP;
      JMP.onGround=false;
      playNote(NOTE.E5,0.1,0.05,'sine');
    }
    JMP.vy+=GRAV*dt;
    JMP.py+=JMP.vy*dt;
  }
  // Only process books near the player (±600px vertical range) for performance
  const nearRange=600;
  const nearBooks=JMP.books.filter(b=>Math.abs(b.baseY-JMP.py)<nearRange);
  // Save previous positions, then animate nearby books
  nearBooks.forEach(b=>{b._px=b.x;b._py=b.y;});
  nearBooks.forEach(b=>{
    if(b.move===1){
      b.x=b.baseX+Math.sin(JMP.timer*b.spd+b.phase)*b.amp;
    } else if(b.move===2){
      b.y=b.baseY+Math.sin(JMP.timer*b.spd+b.phase)*b.amp;
    } else if(b.move===3){
      b.x=b.baseX+Math.sin(JMP.timer*b.spd+b.phase)*b.amp;
      b.y=b.baseY+Math.cos(JMP.timer*b.spd*0.7+b.phase)*b.amp*0.4;
    }
  });
  // Collision with nearby books — player rides moving platforms
  JMP.onGround=false;
  for(const b of nearBooks){
    if(JMP.px>=b.x-8&&JMP.px<=b.x+b.w+8){
      if(JMP.vy>=0&&JMP.py>=b.y-4&&JMP.py<=b.y+b.h+4){
        if(b.trampoline){
          // Trampoline — super bounce!
          JMP.vy=-750;
          JMP.onGround=false;
          spawnBurst(JMP.px,b.y,12,{spread:60,life:0.6,size:3,color:'#ff44aa'});
          playNote(NOTE.C5,0.15,0.1,'sine');
          playNote(NOTE.G5,0.1,0.08,'sine',0.05);
        } else {
          JMP.py=b.y;
          JMP.vy=0;
          JMP.onGround=true;
          JMP.px+=b.x-b._px;
          JMP.py+=b.y-b._py;
        }
        break;
      }
    }
  }
  // Camera smoothly follows player (show player at ~70% from top)
  const targetCam=JMP.py-H*0.7;
  JMP.camY+=(targetCam-JMP.camY)*4*dt;
  // Track highest reached checkpoint
  if(JMP.checkpoints){
    for(let i=JMP.checkpoints.length-1;i>=0;i--){
      if(JMP.py<=JMP.checkpoints[i].y+10){JMP.lastCheckpoint=i;break;}
    }
  }
  // Death: fell too far below current checkpoint or below floor
  const cpY=JMP.lastCheckpoint>0?JMP.checkpoints[JMP.lastCheckpoint].y:JMP.floorY;
  if(JMP.py>cpY+300){
    JMP.deathCount++;
    const cp=JMP.checkpoints[JMP.lastCheckpoint||0];
    JMP.px=cp.x;JMP.py=cp.y;JMP.vy=0;JMP.onGround=true;
    JMP.camY=cp.y-H*0.7;
    playNote(100,0.2,0.08,'sawtooth');
    triggerShake(0.3,4);
  }
  // Goal
  if(Math.abs(JMP.px-JMP.goal.x)<40&&Math.abs(JMP.py-JMP.goal.y)<40){
    JMP.won=true;
    playSuccess();
    const screenGY=JMP.goal.y-JMP.camY;
    spawnBurst(JMP.goal.x,screenGY,30,{spread:200,life:2,size:4,color:'#ffdd44'});
    triggerFlash(0.6);

      currentMap='map2';G.scene='map2';
      G.player={x:100,y:H/2,vx:0,vy:0,frame:0,frameTimer:0,facing:'right'};
      G.timerRunning=true;startBGM();
      fadeAlpha=0;fadeDir=0;fadeCB=null;
    },1500);
  }
}

// ─── RHYTHM GAME (easter egg — left bookshelf in map1) ───────────────────────
const RHY={
  active:false,
  notes:[], // {lane,y,hit,missed}  lane=0-3
  lane:0, // current highlighted lane for visual
  score:0,
  combo:0,
  maxCombo:0,

  song:[],

  feedback:'', feedbackTimer:0, feedbackColor:'',
};
const RHY_KEYS=['KeyD','KeyF','KeyJ','KeyK'];
const RHY_LABELS=['D','F','J','K'];
const RHY_COLORS=['#ff6666','#66ff66','#6688ff','#ffaa44'];
const RHY_LANE_X=[250,330,410,490]; // x positions of 4 lanes

function initRhythm(){
  RHY.active=true;RHY.score=0;RHY.combo=0;RHY.maxCombo=0;RHY.missed=0;
  RHY.timer=0;RHY.songTimer=0;RHY.songDone=false;RHY.won=false;
  RHY.feedback='';RHY.feedbackTimer=0;
  RHY.notes=[];

  // Generate a 2-minute song with varied sections
  RHY.song=[];
  const beatDur=60/RHY.bpm;
  const patterns=[];
  // Phrase patterns (8-beat phrases, lane 0-3)
  const phraseA=[[0,0],[1,1],[2,2],[3,3],[4,2],[5,1],[6,0],[7,1]];
  const phraseB=[[0,2],[0.5,3],[1,1],[1.5,0],[2,3],[3,2],[4,0],[4.5,1],[5,2],[5.5,3],[6,1],[7,0]];
  const phraseC=[[0,0],[0.5,1],[1,2],[1.5,3],[2,3],[2.5,2],[3,1],[3.5,0],[4,0],[5,2],[6,1],[7,3]];
  const phraseD=[[0,0],[0.25,1],[0.5,2],[0.75,3],[1,3],[1.25,2],[1.5,1],[1.75,0],[2,2],[3,1],[4,0],[4.5,3],[5,2],[5.5,1],[6,0],[6.5,3],[7,2],[7.5,1]];
  const phraseE=[[0,3],[1,1],[2,3],[3,1],[4,0],[5,2],[6,0],[7,2]];
  const phraseF=[[0,0],[0.5,2],[1,1],[1.5,3],[2,0],[2.5,2],[3,1],[3.5,3],[4,2],[4.5,0],[5,3],[5.5,1],[6,2],[6.5,0],[7,3],[7.5,1]];
  // Section structure (~240 beats at BPM 120 = 2 minutes)
  function addPhrase(phrase,startBeat){
    phrase.forEach(([b,l])=>patterns.push([startBeat+b,l]));
  }
  let beat=0;
  // Intro (0-32): gentle
  for(let i=0;i<4;i++){addPhrase(phraseA,beat);beat+=8;}
  // Verse 1 (32-64): medium
  for(let i=0;i<4;i++){addPhrase(phraseB,beat);beat+=8;}
  // Chorus 1 (64-96): catchy
  for(let i=0;i<4;i++){addPhrase(phraseC,beat);beat+=8;}
  // Verse 2 (96-128): medium variation
  for(let i=0;i<4;i++){addPhrase(phraseE,beat);beat+=8;}
  // Chorus 2 (128-160): faster
  for(let i=0;i<4;i++){addPhrase(phraseF,beat);beat+=8;}
  // Bridge (160-192): slower feel
  for(let i=0;i<4;i++){addPhrase(phraseA,beat);beat+=8;}
  // Final chorus (192-224): intense
  for(let i=0;i<4;i++){addPhrase(phraseD,beat);beat+=8;}
  // Outro (224-240): winding down
  for(let i=0;i<2;i++){addPhrase(phraseE,beat);beat+=8;}
  // Build notes
  patterns.forEach(([b,lane])=>{
    RHY.notes.push({lane,spawnTime:b*beatDur,y:-20,hit:false,missed:false,active:false});
  });
}
function updateRhythm(dt){
  if(!RHY.active)return;
  if(RHY.won)return;
  RHY.timer+=dt;
  RHY.songTimer+=dt;
  if(RHY.feedbackTimer>0)RHY.feedbackTimer-=dt;
  const beatDur=60/RHY.bpm;
  // Spawn notes
  RHY.notes.forEach(n=>{
    if(!n.active&&!n.hit&&!n.missed&&RHY.songTimer>=n.spawnTime){
      n.active=true;n.y=-20;
      // Play the note sound
      const freq=[NOTE.C4,NOTE.E4,NOTE.G4,NOTE.C5][n.lane];
      playNote(freq,0.15,0.04,'sine');
    }
  });
  // Move active notes down
  RHY.notes.forEach(n=>{
    if(n.active&&!n.hit&&!n.missed){
      n.y+=RHY.speed*dt;
      // Missed — passed hit zone
      if(n.y>RHY.hitLine+50){
        n.missed=true;n.active=false;
        RHY.missed++;RHY.combo=0;
        RHY.feedback='Miss';RHY.feedbackTimer=0.5;RHY.feedbackColor='#ff4444';
      }
    }
  });
  // Key input
  for(let i=0;i<4;i++){
    if(keys[RHY_KEYS[i]]&&!RHY['_held'+i]){
      RHY['_held'+i]=true;
      // Find closest unhit note in this lane near hit line
      let best=null,bestDist=999;
      RHY.notes.forEach(n=>{
        if(n.active&&!n.hit&&!n.missed&&n.lane===i){
          const dist=Math.abs(n.y-RHY.hitLine);
          if(dist<bestDist){bestDist=dist;best=n;}
        }
      });
      if(best&&bestDist<45){
        best.hit=true;best.active=false;
        RHY.combo++;
        if(RHY.combo>RHY.maxCombo)RHY.maxCombo=RHY.combo;
        if(bestDist<15){RHY.score+=100;RHY.feedback='Perfect!';RHY.feedbackColor='#ffdd44';}
        else if(bestDist<30){RHY.score+=50;RHY.feedback='Good!';RHY.feedbackColor='#44ff88';}
        else{RHY.score+=25;RHY.feedback='OK';RHY.feedbackColor='#88aacc';}
        RHY.feedbackTimer=0.4;
        const freq=[NOTE.C4,NOTE.E4,NOTE.G4,NOTE.C5][i];
        playNote(freq,0.3,0.08,'sine');
        spawnBurst(RHY_LANE_X[i],RHY.hitLine,6,{spread:40,life:0.6,size:2,color:RHY_COLORS[i]});
      }
    }
    if(!keys[RHY_KEYS[i]])RHY['_held'+i]=false;
  }
  // Song complete check
  if(!RHY.songDone&&RHY.notes.every(n=>n.hit||n.missed)){
    RHY.songDone=true;
    setTimeout(()=>{
      RHY.won=true;
      playSuccess();
      spawnBurst(W/2,H/2,30,{spread:200,life:2,size:4,color:'#ffdd44'});
    },500);
    setTimeout(()=>{
      RHY.active=false;
      G.scene='map1';
      showMessage(`리듬게임 클리어! 점수: ${RHY.score}`,3,'#ffdd44');
    },3000);
  }
}
function renderRhythm(t){
  ctx.fillStyle='#080415';ctx.fillRect(0,0,W,H);
  drawStars(t,0.3);
  // Title
  glowText('별빛의 선율',W/2,30,'#aabbff',18,12);
  // Lane backgrounds
  for(let i=0;i<4;i++){
    const lx=RHY_LANE_X[i];
    ctx.save();
    ctx.fillStyle='rgba(20,15,40,0.6)';
    ctx.fillRect(lx-30,60,60,480);
    // Lane border
    ctx.strokeStyle='rgba(80,60,120,0.3)';ctx.lineWidth=1;
    ctx.strokeRect(lx-30,60,60,480);
    ctx.restore();
  }
  // Hit zone line
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(210,RHY.hitLine);ctx.lineTo(530,RHY.hitLine);ctx.stroke();
  ctx.restore();
  // Hit zone buttons
  for(let i=0;i<4;i++){
    const lx=RHY_LANE_X[i];
    const held=keys[RHY_KEYS[i]];
    ctx.save();
    ctx.strokeStyle=held?RHY_COLORS[i]:'rgba(100,80,150,0.5)';
    ctx.lineWidth=held?3:1;
    if(held){ctx.shadowColor=RHY_COLORS[i];ctx.shadowBlur=15;}
    ctx.beginPath();ctx.arc(lx,RHY.hitLine,22,0,Math.PI*2);ctx.stroke();
    if(held){ctx.fillStyle=RHY_COLORS[i];ctx.globalAlpha=0.2;ctx.fill();}
    ctx.restore();
    // Key label
    glowText(RHY_LABELS[i],lx,RHY.hitLine+1,held?'#ffffff':'#556677',14,held?8:2);
  }
  // Notes (falling)
  RHY.notes.forEach(n=>{
    if(!n.active||n.hit||n.missed)return;
    const lx=RHY_LANE_X[n.lane];
    const ny=n.y;
    if(ny<50||ny>H)return;
    ctx.save();
    ctx.shadowColor=RHY_COLORS[n.lane];ctx.shadowBlur=10;
    ctx.fillStyle=RHY_COLORS[n.lane];
    ctx.beginPath();ctx.arc(lx,ny,12,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(lx,ny,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  // Feedback text
  if(RHY.feedbackTimer>0){
    const fa=Math.min(1,RHY.feedbackTimer*3);
    const fScale=1+(0.4-RHY.feedbackTimer)*0.8;
    ctx.save();ctx.globalAlpha=fa;
    ctx.translate(W/2,RHY.hitLine-50);ctx.scale(fScale,fScale);
    glowText(RHY.feedback,0,0,RHY.feedbackColor,20,12);
    ctx.restore();
  }
  // Score + Combo
  glowText(`Score: ${RHY.score}`,680,80,'#aabbcc',14,6);
  if(RHY.combo>=3){
    const cp=1+0.05*Math.sin(t*6);
    ctx.save();ctx.translate(680,110);ctx.scale(cp,cp);
    glowText(`${RHY.combo} Combo!`,0,0,'#ffdd44',16,10);
    ctx.restore();
  }
  glowText(`Miss: ${RHY.missed}`,680,140,'#ff6666',12,4);
  // Controls hint
  glowText('D  F  J  K',W/2,H-20,'#556677',12,4);
  // Win
  if(RHY.won){
    ctx.save();ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,H/2-50,W,100);ctx.restore();
    glowText('클리어!',W/2,H/2-15,'#ffdd44',28,20);
    glowText(`점수: ${RHY.score}  |  최대 콤보: ${RHY.maxCombo}`,W/2,H/2+20,'#aabbcc',14,8);
  }
  drawParticles();
}

// Helper: repeat a rhythm pattern across a beat range
function rhythmFill(arr,startBeat,endBeat,pattern){
  // pattern = array of offsets within a bar (e.g. [0,1,2,3] = every beat, [0,2] = half notes)
  const barLen=pattern[pattern.length-1]+1||4;
  for(let bar=startBeat;bar<endBeat;bar+=barLen){
    pattern.forEach(p=>{if(bar+p<endBeat)arr.push(bar+p);});
  }
}
