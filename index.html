let priSelectIdx=0;
let priSelecting=false; // true=song select screen, false=playing

function initPripara(){
  priSelecting=true;
  priSelectIdx=0;
  G.scene='pripara';
  Object.keys(keys).forEach(k=>keys[k]=false);
  initAudio();
}
function startPriparaSong(idx){
  const song=PRI_SONGS[idx];
  priSelecting=false;
  PRI.active=true;PRI.score=0;PRI.combo=0;PRI.maxCombo=0;PRI.missed=0;
  PRI.timer=0;PRI.songDone=false;PRI.won=false;
  PRI.feedback='';PRI.feedbackTimer=0;PRI._held=false;PRI.autoMode=false;PRI._sHeld=false;
  PRI.notes=[];
  PRI.songName=song.name;
  const bpm=song.bpm, beatDur=60/bpm;
  const beats=song.gen();
  beats.forEach(b=>{
    PRI.notes.push({
      angle:Math.PI/2,
      spawnTime:b*beatDur,
      hit:false,missed:false,active:false,
      color:PRI_NOTE_COLORS[Math.floor(Math.random()*PRI_NOTE_COLORS.length)],
    });
  });
  Object.keys(keys).forEach(k=>keys[k]=false);
}
function updatePripara(dt){
  // Song select screen input
  if(priSelecting){
    if(keys['ArrowUp']&&!PRI._selU){PRI._selU=true;priSelectIdx=(priSelectIdx-1+PRI_SONGS.length)%PRI_SONGS.length;playNote(NOTE.E4,0.1,0.05,'sine');}
    if(!keys['ArrowUp'])PRI._selU=false;
    if(keys['ArrowDown']&&!PRI._selD){PRI._selD=true;priSelectIdx=(priSelectIdx+1)%PRI_SONGS.length;playNote(NOTE.E4,0.1,0.05,'sine');}
    if(!keys['ArrowDown'])PRI._selD=false;
    if((keys['Enter']||keys['Space'])&&!PRI._selE){PRI._selE=true;startPriparaSong(priSelectIdx);}
    if(!keys['Enter']&&!keys['Space'])PRI._selE=false;
    if(keys['Escape']){priSelecting=false;G.scene='map1';}
    // Mouse click on song
    if(mouse.justDown){
      for(let i=0;i<PRI_SONGS.length;i++){
        const sy=210+i*65;
        if(mouse.x>=150&&mouse.x<=650&&mouse.y>=sy-20&&mouse.y<=sy+25){
          priSelectIdx=i;
          startPriparaSong(i);break;
        }
      }
    }
    return;
  }
  if(!PRI.active||PRI.won)return;
  PRI.timer+=dt;
  if(PRI.feedbackTimer>0)PRI.feedbackTimer-=dt;
  // Auto mode toggle — S key
  if(keys['KeyS']&&!PRI._sHeld){PRI._sHeld=true;PRI.autoMode=!PRI.autoMode;}
  if(!keys['KeyS'])PRI._sHeld=false;
  const orbitSpeed=Math.PI*0.8;
  // Spawn
  PRI.notes.forEach(n=>{
    if(!n.active&&!n.hit&&!n.missed&&PRI.timer>=n.spawnTime){
      n.active=true;n.angle=Math.PI/2;
    }
  });
  // Move notes
  PRI.notes.forEach(n=>{
    if(n.active&&!n.hit&&!n.missed){
      n.angle-=orbitSpeed*dt;
      if(n.angle<PRI.hitAngle-0.5){
        n.missed=true;n.active=false;
        PRI.missed++;PRI.combo=0;
        PRI.feedback='Miss';PRI.feedbackTimer=0.4;PRI.feedbackColor='#ff4444';
      }
    }
  });
  // Auto mode — automatically hit notes at perfect timing
  if(PRI.autoMode){
    PRI.notes.forEach(n=>{
      if(n.active&&!n.hit&&!n.missed&&Math.abs(n.angle-PRI.hitAngle)<0.05){
        n.hit=true;n.active=false;
        PRI.combo++;
        if(PRI.combo>PRI.maxCombo)PRI.maxCombo=PRI.combo;
        PRI.score+=100;PRI.feedback='✦ AUTO';PRI.feedbackColor='#88ffaa';
        PRI.feedbackTimer=0.3;
        const notes=[NOTE.C5,NOTE.E5,NOTE.G5,NOTE.A5,NOTE.C4,NOTE.E4];
        playNote(notes[PRI.combo%notes.length],0.25,0.1,'triangle');
        const hx=W/2+Math.cos(PRI.hitAngle)*PRI.ringR, hy=H/2+Math.sin(PRI.hitAngle)*PRI.ringR;
        spawnBurst(hx,hy,10,{spread:60,life:0.8,size:3,color:n.color});
      }
    });
  }
  // Manual input — Space or Enter or mouse click
  const pressed=keys['Space']||keys['Enter']||mouse.justDown;
  if(pressed&&!PRI._held&&!PRI.autoMode){
    PRI._held=true;
    let best=null,bestD=999;
    PRI.notes.forEach(n=>{
      if(n.active&&!n.hit&&!n.missed){
        const d=Math.abs(n.angle-PRI.hitAngle);
        if(d<bestD){bestD=d;best=n;}
      }
    });
    if(best&&bestD<0.35){
      best.hit=true;best.active=false;
      PRI.combo++;
      if(PRI.combo>PRI.maxCombo)PRI.maxCombo=PRI.combo;
      if(bestD<0.1){PRI.score+=100;PRI.feedback='✦ Perfect!';PRI.feedbackColor='#ffdd44';}
      else if(bestD<0.2){PRI.score+=50;PRI.feedback='★ Great!';PRI.feedbackColor='#ff66aa';}
      else{PRI.score+=25;PRI.feedback='☆ Good';PRI.feedbackColor='#88ccff';}
      PRI.feedbackTimer=0.5;
      const notes=[NOTE.C5,NOTE.E5,NOTE.G5,NOTE.A5,NOTE.C4,NOTE.E4];
      playNote(notes[PRI.combo%notes.length],0.25,0.1,'triangle');
      const hx=W/2+Math.cos(PRI.hitAngle)*PRI.ringR, hy=H/2+Math.sin(PRI.hitAngle)*PRI.ringR;
      spawnBurst(hx,hy,10,{spread:60,life:0.8,size:3,color:best.color});
    }
  }
  if(!keys['Space']&&!keys['Enter']&&!mouse.down)PRI._held=false;
  // Song done
  if(!PRI.songDone&&PRI.notes.every(n=>n.hit||n.missed)){
    PRI.songDone=true;
    setTimeout(()=>{PRI.won=true;playSuccess();spawnBurst(W/2,H/2,40,{spread:250,life:2.5,size:4,color:'#ff66aa'});},500);
    setTimeout(()=>{PRI.active=false;G.scene='map1';showMessage(`별빛 스테이지 클리어! 점수: ${PRI.score}`,3,'#ff66aa');},3000);
  }
}
function renderPripara(t){
  // Background — sparkly stage
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,400);
  bg.addColorStop(0,'#1a0828');bg.addColorStop(0.5,'#100520');bg.addColorStop(1,'#080412');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // ── Song Select Screen ──
  if(priSelecting){
    // Sparkles
    for(let i=0;i<30;i++){
      const sx=(i*73+t*10)%W, sy=(i*97+t*6)%H;
      ctx.save();ctx.globalAlpha=0.3+0.3*Math.abs(Math.sin(t*2+i));
      ctx.fillStyle=i%3===0?'#ffaadd':i%3===1?'#aaddff':'#ffffaa';
      ctx.fillRect(sx-1,sy-1,2,2);ctx.restore();
    }
    glowText('✦ 별빛 스테이지 ✦',W/2,60,'#ffaadd',22,15);
    glowText('곡을 선택하세요',W/2,90,'#aa88cc',14,8);
    // Song list
    PRI_SONGS.forEach((s,i)=>{
      const sy=210+i*65;
      const sel=i===priSelectIdx;
      const hover=mouse.x>=150&&mouse.x<=650&&mouse.y>=sy-20&&mouse.y<=sy+25;
      // Background bar
      if(sel||hover){
        ctx.save();
        ctx.fillStyle=sel?'rgba(255,100,200,0.15)':'rgba(200,150,255,0.08)';
        ctx.fillRect(150,sy-20,500,45);
        ctx.strokeStyle='rgba(255,150,220,0.3)';ctx.lineWidth=1;
        ctx.strokeRect(150,sy-20,500,45);
        ctx.restore();
      }
      if(sel)glowText('▶',140,sy+2,'#ffaadd',16,10);
      // Song name
      glowText(s.name,W/2-40,sy,sel?'#ffffff':'#aa88cc',sel?18:16,sel?12:4);
      // Difficulty
      glowText(s.diff,W/2+180,sy,sel?'#ffdd44':'#886644',12,4);
      // BPM
      glowText(`BPM ${s.bpm}`,W/2+180,sy+16,'#665577',9,2);
    });
    glowText('↑↓ 선택  |  Enter/Space 시작  |  Esc 나가기',W/2,H-30,'#554466',10,4);
    return;
  }
  // Sparkles
  for(let i=0;i<40;i++){
    const sx=(i*73+t*15)%W, sy=(i*97+t*8)%H;
    ctx.save();ctx.globalAlpha=0.3+0.4*Math.abs(Math.sin(t*2+i*0.7));
    ctx.fillStyle=i%3===0?'#ffaadd':i%3===1?'#aaddff':'#ffffaa';
    ctx.fillRect(sx-1,sy-1,2,2);ctx.restore();
  }
  // Spotlight beams
  ctx.save();ctx.globalAlpha=0.05;
  for(let i=0;i<6;i++){
    const a=t*0.3+i*Math.PI/3;
    ctx.fillStyle=PRI_NOTE_COLORS[i%6];
    ctx.beginPath();ctx.moveTo(W/2,H/2);
    ctx.lineTo(W/2+Math.cos(a)*500,H/2+Math.sin(a)*500);
    ctx.lineTo(W/2+Math.cos(a+0.12)*500,H/2+Math.sin(a+0.12)*500);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();

  const cx=W/2,cy=H/2,R=PRI.ringR;
  // Ring track
  ctx.save();
  ctx.strokeStyle='rgba(255,150,220,0.25)';ctx.lineWidth=8;
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();
  ctx.restore();
  // Ring glow outline
  ctx.save();
  ctx.strokeStyle='rgba(255,100,200,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,R-6,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,R+6,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // Hit zone at top — glowing target
  const hx=cx+Math.cos(PRI.hitAngle)*R, hy=cy+Math.sin(PRI.hitAngle)*R;
  const held=keys['Space']||keys['Enter']||mouse.down;
  ctx.save();
  ctx.shadowColor='#ffaadd';ctx.shadowBlur=held?30:15;
  ctx.strokeStyle=held?'#ffffff':'#ffaadd';
  ctx.lineWidth=held?4:3;
  ctx.beginPath();ctx.arc(hx,hy,22,0,Math.PI*2);ctx.stroke();
  if(held){ctx.fillStyle='rgba(255,170,220,0.25)';ctx.fill();}
  ctx.restore();
  glowText('Space',hx,hy-32,held?'#ffffff':'#aa6688',10,4);

  // Notes on ring
  PRI.notes.forEach(n=>{
    if(!n.active||n.hit||n.missed)return;
    const nx=cx+Math.cos(n.angle)*R, ny=cy+Math.sin(n.angle)*R;
    const sz=9+2*Math.sin(t*6);
    ctx.save();
    ctx.translate(nx,ny);ctx.rotate(t*4);
    ctx.shadowColor=n.color;ctx.shadowBlur=12;
    ctx.fillStyle=n.color;
    // Diamond
    ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz*0.6,0);ctx.lineTo(0,sz);ctx.lineTo(-sz*0.6,0);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(0,0,2.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // Center emblem
  ctx.save();
  const ep=1+0.1*Math.sin(t*5);
  ctx.translate(cx,cy);ctx.scale(ep,ep);
  ctx.fillStyle='rgba(255,100,200,0.12)';
  ctx.beginPath();ctx.arc(0,0,35,0,Math.PI*2);ctx.fill();
  glowText('♪',0,1,'#ffaadd',24,10);
  ctx.restore();

  // Feedback
  if(PRI.feedbackTimer>0){
    const fa=Math.min(1,PRI.feedbackTimer*2.5);
    const fs=1+(0.5-PRI.feedbackTimer)*1.0;
    ctx.save();ctx.globalAlpha=fa;ctx.translate(cx,cy-50);ctx.scale(fs,fs);
    glowText(PRI.feedback,0,0,PRI.feedbackColor,24,15);ctx.restore();
  }
  // Combo
  if(PRI.combo>=3){
    const cp=1+0.06*Math.sin(t*7);
    ctx.save();ctx.translate(cx,cy+R+45);ctx.scale(cp,cp);
    glowText(`${PRI.combo} Combo!`,0,0,'#ffaa66',18,12);ctx.restore();
  }
  // UI
  glowText(`Score: ${PRI.score}`,W-70,30,'#ddbbee',14,6);
  glowText(`Miss: ${PRI.missed}`,W-70,52,'#ff6666',11,4);
  glowText('✦ 별빛 스테이지 ✦',cx,22,'#ffaadd',14,10);
  glowText(PRI.songName||'',cx,42,'#cc88dd',11,6);
  glowText('Space / 클릭으로 타이밍을 맞춰!',cx,H-16,'#665577',10,4);
  if(PRI.autoMode)glowText('AUTO',cx,H-32,'#88ffaa',12,8);
  // Win
  if(PRI.won){
    ctx.save();ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,H/2-55,W,110);ctx.restore();
    glowText('✦ Stage Clear! ✦',cx,H/2-20,'#ffaadd',28,20);
    glowText(`점수: ${PRI.score}  |  최대 콤보: ${PRI.maxCombo}`,cx,H/2+18,'#ccaadd',14,8);
  }
  drawParticles();
}

// ─── EASTER EGG ORDER TRACKING ──────────────────────────────────────────────
// Required order: 1.가운데(pripara) → 2.왼쪽(rhythm) → 3.오른쪽(cat)
// Completing all 3 in order = -5 seconds from final time
const EGG_ORDER=['shelf_pripara','shelf_rhythm','shelf_cat'];
let eggProgress=0; // how many completed in correct order (0-3)
let eggBonusApplied=false;

function checkEggOrder(shelfId){
  if(eggBonusApplied)return;
  if(shelfId===EGG_ORDER[eggProgress]){
    eggProgress++;
    if(eggProgress===3){
      eggBonusApplied=true;
      // -5 seconds bonus will be applied at result screen
    }
  } else {
    // Wrong order — reset progress
    eggProgress=shelfId===EGG_ORDER[0]?1:0;
  }
}

function updateAquaMap(dt){
  if(!AQU.active||AQU.won)return;
  AQU.timer+=dt;
  const GRAV=350;    // very light gravity (underwater)
  const BUOY=-180;   // buoyancy — passive upward force
  const SWIM=-300;    // active swim upward
  const MAXFALL=120;  // terminal velocity (water resistance)
  const SPD=160;      // slower horizontal (water drag)
  let dx=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
  if(keys['ArrowRight']||keys['KeyD'])dx=1;
  AQU.px+=dx*SPD*dt;
  AQU.px=Math.max(15,Math.min(W-15,AQU.px));
  // Swimming: hold up — stamina drains while held, recharges while released
  // Short taps (1-2s) are free. Only 5+ seconds continuous triggers exhaustion.
  const swimUp=keys['ArrowUp']||keys['KeyW']||keys['Space'];
  if(AQU.swimStamina===undefined){AQU.swimStamina=5;AQU.swimExhausted=false;AQU.swimCooldown=0;}
  if(AQU.swimExhausted){
    // Cooldown: 10 seconds to fully recharge, can't swim during cooldown
    AQU.swimCooldown+=dt;
    if(AQU.swimCooldown>=10){AQU.swimExhausted=false;AQU.swimStamina=5;AQU.swimCooldown=0;}
  } else if(swimUp){
    // Swimming — drain stamina
    AQU.vy+=SWIM*dt;
    AQU.swimStamina-=dt;
    if(AQU.swimStamina<=0){AQU.swimStamina=0;AQU.swimExhausted=true;AQU.swimCooldown=0;}
    if(Math.random()<0.3)spawnParticle(AQU.px+Math.random()*6-3,AQU.py-10,{spread:8,life:0.5,size:2,color:'rgba(150,220,255,0.5)'});
  } else {
    // Not holding up — stamina recovers quickly (1s back per 1s rest)
    if(AQU.swimStamina<5)AQU.swimStamina=Math.min(5,AQU.swimStamina+dt);
  }
  // Gravity + buoyancy
  AQU.vy+=(GRAV+BUOY)*dt; // net = slight downward (170)
  // Water resistance — cap fall speed
  if(AQU.vy>MAXFALL)AQU.vy=MAXFALL;
  // Cap rise speed too
  if(AQU.vy<-250)AQU.vy=-250;
  AQU.py+=AQU.vy*dt;
  // Animate + collide nearby platforms
  const near=AQU.platforms.filter(b=>Math.abs(b.baseY-AQU.py)<500);
  near.forEach(b=>{b._px=b.x;b._py=b.y;});
  near.forEach(b=>{
    if(b.move===1){b.x=b.baseX+Math.sin(AQU.timer*b.spd+b.phase)*b.amp;}
    else if(b.move===2){b.y=b.baseY+Math.sin(AQU.timer*b.spd+b.phase)*b.amp;}
    else if(b.move===3){b.x=b.baseX+Math.sin(AQU.timer*b.spd+b.phase)*b.amp;b.y=b.baseY+Math.cos(AQU.timer*b.spd*0.7+b.phase)*b.amp*0.4;}
  });
  AQU.onGround=false;
  for(const b of near){
    if(AQU.px>=b.x-8&&AQU.px<=b.x+b.w+8){
      if(AQU.vy>=0&&AQU.py>=b.y-4&&AQU.py<=b.y+b.h+4){
        if(b.type==='jelly'){
          AQU.vy=-600;AQU.onGround=false;
          spawnBurst(AQU.px,b.y,8,{spread:40,life:0.5,size:2,color:'#88ddff'});
          playNote(NOTE.E5,0.12,0.06,'sine');
        } else {
          AQU.py=b.y;AQU.vy=0;AQU.onGround=true;
          AQU.px+=b.x-b._px;AQU.py+=b.y-b._py;
        }
        break;
      }
    }
  }
  // Camera
  const tc=AQU.py-H*0.7;
  AQU.camY+=(tc-AQU.camY)*4*dt;
  // Checkpoints
  for(let i=AQU.checkpoints.length-1;i>=0;i--){
    if(AQU.py<=AQU.checkpoints[i].y+10){AQU.lastCheckpoint=i;break;}
  }
  // Death
  const cpY=AQU.lastCheckpoint>0?AQU.checkpoints[AQU.lastCheckpoint].y:AQU.floorY;
  if(AQU.py>cpY+300){
    AQU.deathCount++;
    const cp=AQU.checkpoints[AQU.lastCheckpoint||0];
    AQU.px=cp.x;AQU.py=cp.y;AQU.vy=0;AQU.onGround=true;AQU.camY=cp.y-H*0.7;
    playNote(100,0.15,0.06,'sawtooth');triggerShake(0.2,3);
  }
  // Goal
  if(Math.abs(AQU.px-AQU.goal.x)<40&&Math.abs(AQU.py-AQU.goal.y)<40){
    AQU.won=true;playSuccess();
    spawnBurst(AQU.goal.x,AQU.goal.y-AQU.camY,30,{spread:200,life:2,size:4,color:'#ffcc44'});
    triggerFlash(0.5);
    setTimeout(()=>{
      AQU.active=false;
      currentMap='map2';G.scene='map2';
      G.player={x:100,y:H/2,vx:0,vy:0,frame:0,frameTimer:0,facing:'right'};
      G.timerRunning=true;startBGM();fadeAlpha=0;fadeDir=0;fadeCB=null;
    },1500);
  }
  // Bubbles
  AQU.bubbles.forEach(b=>{
    b.y-=b.spd*dt;
    b.x+=Math.sin(AQU.timer*1.5+b.phase)*8*dt;
    if(b.y<AQU.camY-50){b.y=AQU.camY+H+50;b.x=Math.random()*W;}
  });
}
function renderAquaMap(t){
  // Underwater gradient
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#041830');bg.addColorStop(0.5,'#083050');bg.addColorStop(1,'#0a1828');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Light rays from top
  ctx.save();ctx.globalAlpha=0.04;
  for(let i=0;i<5;i++){
    const rx=150+i*130+Math.sin(t*0.3+i)*20;
    ctx.fillStyle='#44aadd';
    ctx.beginPath();ctx.moveTo(rx,0);ctx.lineTo(rx-40,H);ctx.lineTo(rx+40,H);ctx.closePath();ctx.fill();
  }
  ctx.restore();
  const cam=AQU.camY;
  // Bubbles
  AQU.bubbles.forEach(b=>{
    const sy=b.y-cam;
    if(sy<-20||sy>H+20)return;
    ctx.save();ctx.globalAlpha=0.3;
    ctx.strokeStyle='#88ccee';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(b.x,sy,b.sz,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.1;ctx.fillStyle='#aaddff';ctx.fill();
    ctx.restore();
  });
  // Platforms
  AQU.platforms.forEach(b=>{
    const sy=b.y-cam;
    if(sy<-50||sy>H+50)return;
    ctx.save();
    if(b.type==='sand'){
      ctx.fillStyle='#c2a55a';ctx.fillRect(b.x,sy,b.w,b.h);
      ctx.fillStyle='#d4b86a';ctx.fillRect(b.x,sy,b.w,3);
    } else if(b.type==='reef'){
      ctx.shadowColor='#44aa88';ctx.shadowBlur=6;
      ctx.fillStyle='#3a7a6a';ctx.fillRect(b.x,sy,b.w,b.h);
      ctx.fillStyle='#4a9a7a';ctx.fillRect(b.x,sy,b.w,3);
      if(b.label){ctx.shadowBlur=0;ctx.font="9px 'Malgun Gothic',sans-serif";ctx.textAlign='center';ctx.fillStyle='#aaffcc';ctx.fillText(b.label,b.x+b.w/2,sy+10);}
    } else if(b.type==='jelly'){
      // Jellyfish platform — translucent dome
      const pulse=Math.sin(t*3+b.phase)*3;
      ctx.shadowColor='#88ddff';ctx.shadowBlur=12;
      ctx.fillStyle='rgba(100,200,255,0.4)';
      ctx.beginPath();ctx.ellipse(b.x+b.w/2,sy+pulse,b.w/2,12,0,Math.PI,0);ctx.fill();
      ctx.strokeStyle='rgba(150,220,255,0.6)';ctx.lineWidth=1.5;ctx.stroke();
      // Tentacles
      ctx.strokeStyle='rgba(100,180,255,0.25)';ctx.lineWidth=1;
      for(let j=0;j<4;j++){
        const tx=b.x+b.w*0.2+j*b.w*0.2;
        ctx.beginPath();ctx.moveTo(tx,sy+10);
        ctx.quadraticCurveTo(tx+Math.sin(t*2+j)*5,sy+25,tx+Math.sin(t*1.5+j)*8,sy+35);ctx.stroke();
      }
    } else if(b.type==='goal'){
      ctx.shadowColor='#ffcc44';ctx.shadowBlur=15;
      ctx.fillStyle='#ffcc44';ctx.fillRect(b.x,sy,b.w,b.h);
      ctx.fillStyle='#ffee88';ctx.fillRect(b.x,sy,b.w,4);
    } else {
      // Coral
      ctx.shadowColor=b.color;ctx.shadowBlur=4;
      ctx.fillStyle=b.color;ctx.fillRect(b.x,sy,b.w,b.h);
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(b.x,sy,b.w,3);
      // Coral bumps
      ctx.fillStyle=b.color;
      for(let j=0;j<3;j++){
        const cx=b.x+b.w*0.2+j*b.w*0.3;
        ctx.beginPath();ctx.arc(cx,sy,4+Math.random()*2,Math.PI,0);ctx.fill();
      }
    }
    ctx.restore();
  });
  // Sunfish (개복치) at goal — realistic shape
  if(!AQU.won){
    const gsy=AQU.goal.y-cam;
    if(gsy>-100&&gsy<H+50){
      const bob=Math.sin(t*0.8)*6; // 둥실둥실 느리게
      const sway=Math.sin(t*0.5)*2; // 살짝 좌우 흔들림
      ctx.save();
      ctx.translate(AQU.goal.x+sway,gsy-25+bob);
      // Ambient glow — 몽환적 분위기
      ctx.shadowColor='rgba(100,160,200,0.4)';ctx.shadowBlur=25;
      // Body — 세로로 길고 좌우로 납작한 타원 (머리만 있는 느낌)
      ctx.fillStyle='#b0c4d0'; // 연한 회색~푸른빛
      ctx.beginPath();ctx.ellipse(0,0,28,36,0,0,Math.PI*2);ctx.fill();
      // Body highlight — 매끈한 질감
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(180,210,225,0.4)';
      ctx.beginPath();ctx.ellipse(-6,-8,14,20,0.2,0,Math.PI*2);ctx.fill();
      // Body subtle darker edge
      ctx.strokeStyle='rgba(80,110,130,0.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.ellipse(0,0,28,36,0,0,Math.PI*2);ctx.stroke();
      // 등지느러미 (위로 길게 쭉)
      ctx.fillStyle='#99b0bc';
      ctx.beginPath();
      ctx.moveTo(-3,-34);
      ctx.quadraticCurveTo(-12,-55-Math.sin(t*1.2)*3, -5,-70);
      ctx.quadraticCurveTo(2,-60, 5,-34);
      ctx.closePath();ctx.fill();
      // 뒷지느러미 (아래로 길게 쭉)
      ctx.beginPath();
      ctx.moveTo(-3,34);
      ctx.quadraticCurveTo(-12,55+Math.sin(t*1.2)*3, -5,70);
      ctx.quadraticCurveTo(2,60, 5,34);
      ctx.closePath();ctx.fill();
      // 꼬리 — 갈라지지 않고 둥글게 잘린 형태
      ctx.fillStyle='#a0b4c0';
      ctx.beginPath();
      ctx.moveTo(-26,-12);
      ctx.quadraticCurveTo(-38,0,-26,12);
      ctx.lineTo(-24,8);
      ctx.quadraticCurveTo(-30,0,-24,-8);
      ctx.closePath();ctx.fill();
      // 작은 옆지느러미 (눈에 잘 안 띔)
      ctx.fillStyle='rgba(160,185,195,0.6)';
      ctx.beginPath();
      ctx.moveTo(15,2);
      ctx.quadraticCurveTo(24,8,20,14);
      ctx.quadraticCurveTo(16,10,15,6);
      ctx.closePath();ctx.fill();
      // 눈 — 작고 동그랗고 멍한 표정, 약간 앞쪽
      ctx.fillStyle='#eef3f5';
      ctx.beginPath();ctx.arc(14,-8,4.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2a3a44';
      ctx.beginPath();ctx.arc(15.5,-8,2.5,0,Math.PI*2);ctx.fill();
      // 눈 하이라이트
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(14.5,-9.5,1,0,Math.PI*2);ctx.fill();
      // 입 — 아주 작고 점처럼, 살짝 튀어나온 느낌
      ctx.fillStyle='#8a9aa5';
      ctx.beginPath();ctx.arc(26,-1,2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#708090';
      ctx.beginPath();ctx.arc(27,-1,1,0,Math.PI);ctx.fill();
      ctx.restore();
      glowText('개복치',AQU.goal.x,gsy-100+bob,'#88bbcc',10,6);
    }
  }
  // Player — diver suit
  const ppx=Math.round(AQU.px), ppy=Math.round(AQU.py-cam);
  ctx.save();
  ctx.fillStyle='rgba(0,40,80,0.3)';ctx.beginPath();ctx.ellipse(ppx,ppy+2,8,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#226688';ctx.shadowColor='#44aacc';ctx.shadowBlur=6;
  ctx.fillRect(ppx-6,ppy-20,12,14); // suit
  ctx.fillStyle='#ffcc44';ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(ppx,ppy-25,7,0,Math.PI*2);ctx.fill(); // helmet
  ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(ppx+2,ppy-25,4,0,Math.PI*2);ctx.fill(); // visor
  ctx.fillStyle='#224466';
  if(!AQU.onGround){ctx.fillRect(ppx-4,ppy-6,4,5);ctx.fillRect(ppx+1,ppy-6,4,5);}
  else{const bob=Math.floor(t*6)%2;ctx.fillRect(ppx-4,ppy-6,4,6+bob*2);ctx.fillRect(ppx+1,ppy-6,4,6+(1-bob)*2);}
  // Bubbles from helmet
  if(Math.random()<0.15){spawnParticle(ppx+3,ppy-30,{spread:10,life:0.6,size:2,color:'rgba(150,220,255,0.5)'});}
  ctx.restore();
  // UI
  const hPct=Math.min(100,Math.round(Math.max(0,(AQU.floorY-AQU.py)/(AQU.floorY-AQU.goal.y))*100));
  glowText('개복치를 찾아서!',W/2,24,'#44aacc',14,8);
  // Swim stamina bar
  if(AQU.swimStamina!==undefined){
    const barW=80,barH=6,barX=W/2-barW/2,barY=38;
    ctx.fillStyle='rgba(0,30,60,0.5)';ctx.fillRect(barX-1,barY-1,barW+2,barH+2);
    if(AQU.swimExhausted){
      const cdFill=AQU.swimCooldown/10;
      ctx.fillStyle='#ff4444';ctx.fillRect(barX,barY,barW*cdFill,barH);
    } else {
      const fill=AQU.swimStamina/5;
      ctx.fillStyle=fill<0.3?'#ffaa44':'#44ccff';
      ctx.fillRect(barX,barY,barW*fill,barH);
    }
  }
  glowText(`깊이: ${hPct}%`,70,24,'#88ccdd',12,6);
  glowText('← → 이동  |  ↑ 점프',W/2,H-16,'#446677',10,4);
  if(AQU.deathCount>0)glowText(`실패: ${AQU.deathCount}`,W-60,24,'#ff6666',11,6);
  if(AQU.won){
    ctx.save();ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,H/2-35,W,70);ctx.restore();
    glowText('개복치 발견!',W/2,H/2,'#ffcc44',28,20);
  }
  drawParticles();
}

function renderTitle(t){
  ctx.fillStyle='#010510';ctx.fillRect(0,0,W,H);
  drawStars(t,1.0);
  drawAmbient();
  // Layout: left 1/5 = leaderboard, right 4/5 = main title
  const lbW=W/5; // 160px
  const mainCX=lbW+(W-lbW)/2; // center of right 4/5
  // ── Leaderboard (left 1/5) ──
  // Subtle separator line
  ctx.save();
  ctx.strokeStyle='rgba(100,120,180,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(lbW,40);ctx.lineTo(lbW,H-40);ctx.stroke();
  ctx.restore();
  const board=getDisplayBoard();
  const lbCX=lbW/2;
  glowText('최단 기록',lbCX,H/2-60,'#ffdd88',13,8);
  // Decorative line
  ctx.save();ctx.strokeStyle='rgba(255,220,136,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(lbCX-40,H/2-45);ctx.lineTo(lbCX+40,H/2-45);ctx.stroke();ctx.restore();
  for(let i=0;i<3;i++){
    const entry=board[i];
    const ey=H/2-15+i*50;
    // Rank number
    const rankCol=i===0?'#ffdd88':i===1?'#aabbcc':'#8899aa';
    glowText(`${i+1}`,lbCX,ey,rankCol,18,6);
    if(entry){
      glowText(entry.name,lbCX,ey+18,'#ccddee',11,4);
      glowText(formatTime(entry.time),lbCX,ey+34,'#aabbcc',10,3);
    } else {
      glowText('-',lbCX,ey+18,'#556677',11,4);
    }
  }
  // ── Main title (right 4/5) ──
  const titleAlpha=0.7+0.3*Math.sin(t*1.2);
  ctx.save();
  ctx.globalAlpha=titleAlpha;
  glowText('열세 번째 별자리',mainCX,H/2-80,'#aaccff',36,25);
  ctx.restore();
  glowText('The Thirteenth Constellation',mainCX,H/2-40,'#556688',16,8);
  // 12 zodiac in circle
  for(let i=0;i<12;i++){
    const a=Math.PI*2*i/12-Math.PI/2+t*0.05;
    const rx=150,ry=140;
    const bright=0.5+0.4*Math.sin(t*0.8+i);
    ctx.save();
    ctx.globalAlpha=bright;
    drawZodiacIcon(mainCX+Math.cos(a)*rx,H/2+Math.sin(a)*ry+20,i,0.8);
    ctx.restore();
  }
  // Start prompt
  const pulse=0.6+0.4*Math.sin(t*2);
  ctx.save();ctx.globalAlpha=pulse;
  glowText('클릭하여 시작',mainCX,H-80,'#8899cc',16,10);
  ctx.restore();
  if(mouse.justDown){
    initAudio();
    fadeOut(()=>{G.scene='genderselect';fadeIn();});
  }
}

// ─── DIALOGUE BOX SYSTEM ─────────────────────────────────────────────────────
const DLG={active:false,lines:[],idx:0,charTimer:0,charsShown:0,speaker:'',portrait:'',done:false,onEnd:null};
function startDialogue(lines,onEnd){
  DLG.active=true;DLG.lines=lines;DLG.idx=0;DLG.charTimer=0;DLG.charsShown=0;DLG.done=false;DLG.onEnd=onEnd;
  const l=lines[0];DLG.speaker=l.speaker;DLG.portrait=l.portrait||'';
}
function updateDialogue(dt){
  if(!DLG.active)return;
  const line=DLG.lines[DLG.idx];
  if(DLG.charsShown<line.text.length){
    DLG.charTimer+=dt;
    if(DLG.charTimer>0.03){DLG.charTimer=0;DLG.charsShown++;}
  }
  // Click/Space to advance
  if(mouse.justDown||keys['Space']||keys['Enter']){
    if(DLG.charsShown<line.text.length){
      DLG.charsShown=line.text.length; // skip typing
    } else {
      DLG.idx++;
      if(DLG.idx>=DLG.lines.length){
        DLG.active=false;
        if(DLG.onEnd)DLG.onEnd();
      } else {
        DLG.charsShown=0;DLG.charTimer=0;
        DLG.speaker=DLG.lines[DLG.idx].speaker;
        DLG.portrait=DLG.lines[DLG.idx].portrait||'';
      }
    }
  }
}
function drawDialogue(t){
  if(!DLG.active)return;
  const line=DLG.lines[DLG.idx];
  const txt=line.text.substring(0,DLG.charsShown);
  // Dark box at bottom
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(0,H-160,W,160);
  ctx.strokeStyle='rgba(150,140,120,0.4)';ctx.lineWidth=1;
  ctx.strokeRect(2,H-160,W-4,158);
  // Portrait area
  if(DLG.portrait==='player'){
    if(G.gender==='f')drawFemalePortrait(80,H-80,t);
    else drawMalePortrait(80,H-80,t);
  } else if(DLG.portrait==='staff'){
    // Simple staff portrait
    ctx.fillStyle='#ddccaa';ctx.beginPath();ctx.ellipse(80,H-100,18,22,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#332211';ctx.fillRect(62,H-118,36,8);
    ctx.fillStyle='#4466aa';ctx.fillRect(60,H-78,40,40);
    ctx.fillStyle='#fff';ctx.fillRect(72,H-102,3,3);ctx.fillRect(82,H-102,3,3);
    ctx.fillStyle='#222';ctx.fillRect(73,H-101,2,2);ctx.fillRect(83,H-101,2,2);
  }
  // Speaker name
  if(DLG.speaker){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(140,H-158,120,22);
    ctx.font="12px 'Malgun Gothic',sans-serif";ctx.textAlign='left';
    ctx.fillStyle=line.color||'#ffddaa';
    ctx.fillText(DLG.speaker,148,H-142);
  }
  // Text
  ctx.font="14px 'Malgun Gothic',sans-serif";ctx.textAlign='left';
  ctx.fillStyle='#eee8dd';
  // Word wrap
  const maxW=W-180;let tx=150,ty=H-125;
  for(let i=0;i<txt.length;i++){
    const ch=txt[i];
    const cw=ctx.measureText(ch).width;
    if(tx+cw>150+maxW||ch==='\n'){tx=150;ty+=20;}
    if(ch!=='\n'){ctx.fillText(ch,tx,ty);tx+=cw;}
  }
  // Continue indicator
  if(DLG.charsShown>=line.text.length){
    const blink=Math.sin(t*5)>0;
    if(blink){ctx.fillStyle='#aaa';ctx.fillText('▼',W-30,H-15);}
  }
  ctx.restore();
}

// ─── INTRO CUTSCENE (Stage 0 story) ─────────────────────────────────────────
function getPlayerName(){return G.gender==='f'?'이서연':'한준호';}
function updateIntro(dt){
  G.introTimer+=dt;
  if(!DLG.active&&G.introPhase===0&&G.introTimer>1){
    // Start dialogue
    const pn=getPlayerName();
    startDialogue([
      {speaker:'내레이션',text:'황도 12궁 — 수천 년간 인류가 믿어온 별의 체계.',color:'#aabbcc',portrait:''},
      {speaker:'내레이션',text:'그러나 한 천문학자는 의문을 품고 있었다.',color:'#aabbcc',portrait:''},
      {speaker:'내레이션',text:'"12개의 별자리 사이, 비어 있는 틈이 있다."',color:'#ffddaa',portrait:''},
      {speaker:pn,text:'현재 황도 12궁 체계는 불완전해.\n누락된 별자리가 있을 거야... Ophiuchus.',portrait:'player',color:'#88ccff'},
      {speaker:pn,text:'증거를 찾으려면 그 고서를 봐야 해.\n도서관에 있다고 했지...',portrait:'player',color:'#88ccff'},
      {speaker:'내레이션',text:`${pn}은(는) 증거를 찾기 위해 도서관으로 향했다.`,color:'#aabbcc',portrait:''},
    ],()=>{G.introPhase=1;G.introTimer=0;});
  }
  if(G.introPhase===1&&G.introTimer>0.5&&!DLG.active){
    // Go to map0 — playable library lobby
    fadeOut(()=>{
      currentMap='map0';G.scene='map0';
      G.player={x:60,y:450,vx:0,vy:0,frame:0,frameTimer:0,facing:'right',isAwakened:false};
      fadeIn();
    });
  }
  updateDialogue(dt);
}
function renderIntro(t){
  // Background — dark with stars for narration phase
  if(G.introPhase<=1){
    ctx.fillStyle='#060412';ctx.fillRect(0,0,W,H);
    drawStars(t,0.5);
    // Zodiac symbols floating
    for(let i=0;i<12;i++){
      const a=t*0.05+i*Math.PI*2/12;
      const r=180;
      ctx.save();ctx.globalAlpha=0.15+0.1*Math.sin(t+i);
      drawZodiacIcon(W/2+Math.cos(a)*r,H/2+Math.sin(a)*r,i,0.7);
      ctx.restore();
    }
    // Question mark in center (13th slot)
    if(G.introTimer>2){
      const qa=Math.min(1,(G.introTimer-2)/1.5);
      ctx.save();ctx.globalAlpha=qa*0.4;
      glowText('?',W/2,H/2,'#ffdd88',40,20);
      ctx.restore();
    }
  }
  drawDialogue(t);
}


// ─── GENDER SELECT SCREEN ────────────────────────────────────────────────────
function renderGenderSelect(t){
  // Bright warm background — daytime feeling
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#e8ddd0');bg.addColorStop(0.5,'#f0e6d8');bg.addColorStop(1,'#ddd0c0');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Soft window light
  for(let i=0;i<3;i++){
    ctx.save();
    const lx=120+i*280;
    const lg=ctx.createRadialGradient(lx,0,0,lx,0,250);
    lg.addColorStop(0,'rgba(255,245,220,0.2)');
    lg.addColorStop(1,'rgba(255,245,220,0)');
    ctx.fillStyle=lg;ctx.fillRect(lx-250,0,500,400);
    ctx.restore();
  }
  // Floating dust in light
  for(let i=0;i<10;i++){
    const dx=(i*97+t*10)%W,dy=(i*131+Math.sin(t*0.3+i)*15)%H;
    ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#d8c8a8';ctx.fillRect(dx,dy,2,2);ctx.restore();
  }

  ctx.font="22px 'Malgun Gothic',sans-serif";ctx.textAlign='center';
  ctx.fillStyle='#5a4a3a';ctx.fillText('당신은 누구입니까?',W/2,70);
  ctx.font="13px 'Malgun Gothic',sans-serif";
  ctx.fillStyle='#8a7a6a';ctx.fillText('캐릭터를 선택하세요',W/2,100);

  const cardW=220,cardH=360;
  const gap=60;
  const leftX=W/2-cardW-gap/2, rightX=W/2+gap/2;
  const cardY=130;

  const hoverF=mouse.x>=leftX&&mouse.x<=leftX+cardW&&mouse.y>=cardY&&mouse.y<=cardY+cardH;
  const hoverM=mouse.x>=rightX&&mouse.x<=rightX+cardW&&mouse.y>=cardY&&mouse.y<=cardY+cardH;

  // Female card
  ctx.save();
  ctx.fillStyle=hoverF?'rgba(255,220,220,0.7)':'rgba(255,250,245,0.6)';
  ctx.strokeStyle=hoverF?'#cc7799':'#b8a898';
  ctx.lineWidth=hoverF?2:1;
  if(hoverF){ctx.shadowColor='#cc7799';ctx.shadowBlur=12;}
  ctx.fillRect(leftX,cardY,cardW,cardH);
  ctx.strokeRect(leftX,cardY,cardW,cardH);
  ctx.restore();
  drawFemalePortrait(leftX+cardW/2,cardY+160,t);
  ctx.font="16px 'Malgun Gothic',sans-serif";ctx.textAlign='center';
  ctx.fillStyle=hoverF?'#aa4466':'#7a6a5a';
  ctx.fillText('여성 연구원',leftX+cardW/2,cardY+cardH-50);
  ctx.font="11px 'Malgun Gothic',sans-serif";
  ctx.fillStyle=hoverF?'#cc6688':'#9a8a7a';
  ctx.fillText('이서연',leftX+cardW/2,cardY+cardH-30);

  // Male card
  ctx.save();
  ctx.fillStyle=hoverM?'rgba(220,230,255,0.7)':'rgba(250,250,255,0.6)';
  ctx.strokeStyle=hoverM?'#6688bb':'#a8a8b8';
  ctx.lineWidth=hoverM?2:1;
  if(hoverM){ctx.shadowColor='#6688bb';ctx.shadowBlur=12;}
  ctx.fillRect(rightX,cardY,cardW,cardH);
  ctx.strokeRect(rightX,cardY,cardW,cardH);
  ctx.restore();
  drawMalePortrait(rightX+cardW/2,cardY+160,t);
  ctx.font="16px 'Malgun Gothic',sans-serif";ctx.textAlign='center';
  ctx.fillStyle=hoverM?'#4466aa':'#5a6a7a';
  ctx.fillText('남성 연구원',rightX+cardW/2,cardY+cardH-50);
  ctx.font="11px 'Malgun Gothic',sans-serif";
  ctx.fillStyle=hoverM?'#6688cc':'#8a8a9a';
  ctx.fillText('한준호',rightX+cardW/2,cardY+cardH-30);

  if(mouse.justDown){
    if(hoverF){G.gender='f';fadeOut(()=>{G.scene='intro';G.introPhase=0;G.introTimer=0;fadeIn();});}
    if(hoverM){G.gender='m';fadeOut(()=>{G.scene='intro';G.introPhase=0;G.introTimer=0;fadeIn();});}
  }
}

// ─── CHARACTER PORTRAITS (image-based) ───────────────────────────────────────
const imgFemale=new Image();imgFemale.src='female.png';
const imgMale=new Image();imgMale.src='male.png';
function drawPortraitImg(img,cx,cy,maxH){
  if(!img.complete||!img.naturalWidth)return;
  const ratio=img.naturalWidth/img.naturalHeight;
  const h=maxH||150;
  const w=h*ratio;
  ctx.drawImage(img,cx-w/2,cy-h/2,w,h);
}
function drawFemalePortrait(cx,cy,t){drawPortraitImg(imgFemale,cx,cy,150);}
function drawMalePortrait(cx,cy,t){drawPortraitImg(imgMale,cx,cy,150);}

// ─── MESSAGE DISPLAY ──────────────────────────────────────────────────────────
let msgTimer=0, msgText='', msgColor='#aabbff';
function showMessage(text,duration=3,color='#aabbff'){
  msgText=text; msgTimer=duration; msgColor=color;
}
function updateMsg(dt){if(msgTimer>0)msgTimer-=dt;}
function drawMsg(){
  if(msgTimer<=0)return;
  const alpha=Math.min(1,msgTimer*2);
  ctx.save();ctx.globalAlpha=alpha;
  glowText(msgText,W/2,H/2+120,msgColor,16,12);
  ctx.restore();
}

// ─── COORDS DISPLAY ───────────────────────────────────────────────────────────
function drawCoords(t){
  if(!G.showCoords)return;
  ctx.save();
  glow('#ffdd88',15);
  ctx.font="14px monospace";
  ctx.fillStyle='#ffdd88';
  ctx.textAlign='center';
  ctx.fillText('은하 좌표: RA 13h 29m 52.7s',W/2,H/2+150);
  ctx.fillText('Dec +27° 58\' 33"',W/2,H/2+170);
  ctx.restore();
}

// ─── STAGE SKIP (Ctrl+A) ─────────────────────────────────────────────────────
function skipStage(){
  initAudio();
  const sc=G.scene;
  if(sc==='title'||sc==='result'||sc==='credits'||sc==='genderselect')return;
  if(sc==='intro'){
    DLG.active=false;
    currentMap='map1';G.scene='map1';
    G.player={x:400,y:440,vx:0,vy:0,frame:0,frameTimer:0,facing:'down',isAwakened:false};
    fadeAlpha=0;fadeDir=0;fadeCB=null;G.transitioning=false;
    return;
  }
  if(sc==='catscene'||sc==='jumpmap'||sc==='rhythm'||sc==='pripara'||sc==='aquamap'){
    JMP.active=false;CAT.active=false;RHY.active=false;PRI.active=false;AQU.active=false;
    currentMap='map2';G.scene='map2';
    G.player={x:100,y:H/2,vx:0,vy:0,frame:0,frameTimer:0,facing:'right'};
    G.timerRunning=true;startBGM();
  } else if(sc==='cutscene'){
    currentMap='map2';G.scene='map2';
    G.player={x:100,y:H/2,vx:0,vy:0,frame:0,frameTimer:0,facing:'right'};
    G.timerRunning=true;startBGM();
  } else if(sc==='map1'){
    currentMap='map2';G.scene='map2';
    G.player={x:100,y:H/2,vx:0,vy:0,frame:0,frameTimer:0,facing:'right'};
    G.timerRunning=true;startBGM();
  } else if(sc==='map2'||sc==='puzzle1'){
    P1.solved=true;G.puzzles[0]=true;P1.active=false;
    MAPS.map2.doorLocked=false;
    MAPS.map2.walls=MAPS.map2.walls.filter(w=>!(w.x===300&&w.y===250&&w.w===200&&w.h===120));
    currentMap='map3';G.scene='map3';
    G.player={x:80,y:H/2,vx:0,vy:0,frame:0,frameTimer:0,facing:'right'};
  } else if(sc==='map3'||sc==='puzzle2'){
    P4.solved=true;G.puzzles[1]=true;P4.active=false;
    MAPS.map3.doorLocked=false;
    currentMap='map4';G.scene='map4';
    G.player={x:80,y:H/2,vx:0,vy:0,frame:0,frameTimer:0,facing:'right'};
  } else if(sc==='map4'||sc==='puzzle3'){
    P3.solved=true;G.puzzles[2]=true;P3.active=false;
    MAPS.map4.doorLocked=false;
    initTransit();return;
  } else if(sc==='transit'){
    currentMap='map6';G.scene='map6';
    G.player={x:100,y:H/2,vx:0,vy:0,frame:0,frameTimer:0,facing:'right'};
  } else if(sc==='map6'||sc==='puzzle5'){
    P5.solved=true;G.puzzles[4]=true;P5.active=false;
    initEnding();return;
  } else if(sc==='ending'){
    G.scene='result';
  } else {return;}
  fadeAlpha=0;fadeDir=0;fadeCB=null;G.transitioning=false;
  G._returnedFromPuzzle=true;
  Object.keys(keys).forEach(k=>keys[k]=false);
}
window.addEventListener('keydown',e=>{
  if(e.key==='.'){
    skipStage();
  }
});


// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let lastTime=0;
function loop(timestamp){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05,(timestamp-lastTime)/1000);
  lastTime=timestamp;
  G.dt=dt;
  G.t+=dt;

  // Shake offset
  let sx=0,sy=0;
  if(shakeTime>0){
    sx=(Math.random()-0.5)*shakeAmt;
    sy=(Math.random()-0.5)*shakeAmt;
    shakeTime-=dt;
  }
  if(flashAlpha>0)flashAlpha=Math.max(0,flashAlpha-dt*4);
  if(glitchTime>0)glitchTime-=dt;

  updateFade(dt);
  updateParticles(dt);
  updateAmbient(dt,G.t);
  updateMsg(dt);
  if(G.timerRunning)G.timer+=dt;

  ctx.save();
  if(sx||sy)ctx.translate(sx,sy);

  // Render based on scene
  const sc=G.scene;
  if(sc==='tmi'){updateTMI(dt);renderTMI(G.t);}
  else if(sc==='title'){renderTitle(G.t);}
  else if(sc==='genderselect'){renderGenderSelect(G.t);}
  else if(sc==='intro'){updateIntro(dt);renderIntro(G.t);}
  else if(sc==='catscene'){updateCatScene(dt);renderCatScene(G.t);}
  else if(sc==='jumpmap'){updateJumpMap(dt);renderJumpMap(G.t);}
  else if(sc==='aquamap'){updateAquaMap(dt);renderAquaMap(G.t);}
  else if(sc==='rhythm'){updateRhythm(dt);renderRhythm(G.t);}
  else if(sc==='pripara'){updatePripara(dt);renderPripara(G.t);}
  else if(sc==='cutscene'){updateCutscene(dt);renderCutscene(G.t);}
  else if(sc==='transit'){updateTransit(dt);renderTransit(G.t);}
  else if(sc==='ending'){updateEnding(dt);renderEnding(G.t);}
  else if(sc==='credits'){updateCredits(dt);renderCredits(G.t);}
  else if(sc==='result'){renderResult(G.t);}
  else if(sc==='puzzle1'){renderMap('map2',G.t);renderP1(G.t);}
  else if(sc==='puzzle2'){renderMap('map3',G.t);renderP4(G.t);}
  else if(sc==='puzzle3'){renderMap('map4',G.t);renderP3(G.t);}
  else if(sc==='puzzle5'){renderMap('map6',G.t);renderP5(G.t);}
  else {
    // Map scenes — clear stale velocity on first frame after puzzle return
    if(G._returnedFromPuzzle){G._returnedFromPuzzle=false;G.player.vx=0;G.player.vy=0;Object.keys(keys).forEach(k=>keys[k]=false);}
    renderMap(sc,G.t);
    updateMouse();drawMouseAndCat();
    // Block movement during dialogue
    if(!DLG.active)updatePlayer(dt);
    else updateDialogue(G.dt);
    // Draw player
    drawPlayer(G.player.x,G.player.y,G.player.frame,G.player.isAwakened,G.t);
    drawParticles();
    if(sc!=='map0')drawAmbient(); // no dark ambient in bright map0
    if(G.showInteract&&G.interactTarget&&!DLG.active){
      if(!G.interactTarget.id.startsWith('shelf_'))drawInteractPrompt(G.interactTarget.label);
    }
    drawMapName(MAPS[sc]?MAPS[sc].name:'');
    drawCoords(G.t);
    drawMsg();
    drawDialogue(G.t); // dialogue box on top of everything
  }

  // Puzzle input
  if(sc==='puzzle1')handleP1Input();
  else if(sc==='puzzle2')handleP4Input();
  else if(sc==='puzzle3')handleP3Input();
  else if(sc==='puzzle5')handleP5Input();

  // Flash
  if(flashAlpha>0){
    ctx.fillStyle=`rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0,0,W,H);
  }

  // Glitch
  if(glitchTime>0)drawGlitch();

  drawFade();

  ctx.restore();
  // Timer drawn last, outside shake transform — always visible on top
  drawTimer();
  // Credit watermark
  ctx.save();
  ctx.font="12px 'Malgun Gothic',sans-serif";
  ctx.fillStyle='rgba(100,180,255,0.45)';
  ctx.textAlign='right';
  ctx.fillText('모과숲-서령',W-4,H-4);
  ctx.restore();

  // Reset per-frame input flags
  mouse.justDown=false;
  mouse.justUp=false;
}

// Init
requestAnimationFrame(loop);
</script>
